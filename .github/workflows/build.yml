name: Build V6 Offline HTML

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build dist/super-calculator-v6.html
        run: node build/build.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: super-calculator-v6
          path: dist/super-calculator-v6.html
