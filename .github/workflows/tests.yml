name: V6 Engine Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify Node version
        run: node --version

      - name: Run all engine tests
        run: |
          for f in tests/*.mjs; do
            echo "Running $f"
            node "$f"
          done
