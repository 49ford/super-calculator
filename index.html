<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Super Calculator – PHASED V3</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0f1117;
      color: #e8eaf0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
  </style>
</head>
<body>

  <div id="root">Loading…</div>

  <script>
    // This loads your embedded app
    fetch('./reference/super-calculator-v6.html')
      .then(res => res.text())
      .then(html => {
        // extract the script content
        const match = html.match(/<script[^>]*>([\\s\\S]*)<\\/script>/i);
        if (!match) {
          document.getElementById('root').innerText = 'ERROR: Could not find app script';
          return;
        }

        // run the script
        eval(match[1]);

        // mount the app
        const root = document.getElementById('root');
        if (typeof mountApp === 'function') {
          mountApp(root);
        } else {
          root.innerText = 'ERROR: mountApp not found';
        }
      })
      .catch(e => {
        document.getElementById('root').innerText = 'ERROR: ' + e;
      });
  </script>

</body>
</html>
