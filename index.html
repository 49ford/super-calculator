<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Superannuation Calculator V12</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f1117;font-family:'DM Sans','Segoe UI',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1a1d27}
::-webkit-scrollbar-thumb{background:#3a3f55;border-radius:3px}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:#2a2f42;outline:none;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#6c8ef0;border:2px solid #0f1117}
input[type=number],input[type=text]{background:#1e2233;border:1px solid #2a3050;border-radius:6px;color:#e8eaf0;padding:5px 8px;font-size:12px;font-family:'DM Mono',monospace;outline:none}
input[type=number]:focus,input[type=text]:focus{border-color:#6c8ef0}
input[type=checkbox]{accent-color:#6c8ef0;width:14px;height:14px;cursor:pointer}
select{background:#1e2233;border:1px solid #2a3050;border-radius:6px;color:#e8eaf0;padding:5px 8px;font-size:12px;outline:none;cursor:pointer}
button{font-family:'DM Sans','Segoe UI',sans-serif}
.section-toggle{width:100%;background:none;border:none;color:#c0c5d8;font-size:12px;font-weight:900;padding:8px 0;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #252a3a;margin-bottom:8px}
.section-toggle:hover{color:#6c8ef0}
.section-toggle .arrow{font-size:10px;transition:transform .2s;color:#5a6080}
.section-toggle.open .arrow{transform:rotate(180deg)}
.section-body{overflow:hidden;transition:max-height .3s ease}
#chart-tooltip{position:fixed;background:#1a1d27;border:1px solid #3a3f55;border-radius:8px;padding:10px 14px;font-size:12px;color:#e8eaf0;pointer-events:none;z-index:999;display:none;min-width:190px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.ls-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:#0f1117;border:1px solid #252a3a;border-radius:6px;margin-bottom:4px;font-size:11px;color:#c0c5d8}
.ls-item .ls-del{background:none;border:none;color:#5a6080;cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
.ls-item .ls-del:hover{color:#f06c6c}
.ls-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:700;margin-left:4px}
.badge-in{background:rgba(93,216,122,.15);color:#5dd87a}
.badge-out{background:rgba(240,108,108,.15);color:#f06c6c}
.badge-super{background:rgba(108,142,240,.15);color:#6c8ef0}
.badge-down{background:rgba(160,108,240,.15);color:#a06cf0}
@media(max-width:800px){
  .main-grid{grid-template-columns:1fr!important;height:auto!important;overflow:visible!important}
  .left-col{height:auto!important;overflow:visible!important;border-right:none!important;padding:16px 16px 0!important}
  .right-col{height:auto!important;overflow:visible!important;padding:0 16px 20px!important}
  .cards-grid{grid-template-columns:1fr 1fr!important}
}
@media(max-width:480px){.cards-grid{grid-template-columns:1fr!important}}
@media print{
  body{background:white!important;color:#111!important;height:auto!important;overflow:visible!important}
  .no-print{display:none!important}
  #chart-tooltip{display:none!important}
  #root{height:auto!important;overflow:visible!important}
  .main-grid{grid-template-columns:1fr!important;height:auto!important;overflow:visible!important}
  .left-col,.right-col{height:auto!important;overflow:visible!important}
  table{font-size:10px!important}
}
</style>

<body>
<div id="chart-tooltip"></div>
<div id="root"></div>
<script>
(function(){
'use strict';
function showFatal(msg,err){
  console.error(msg,err||'');
  var r=document.getElementById('root');
  if(r)r.innerHTML='<div style="padding:32px;background:#0f1117;color:#f06c6c;font-family:monospace"><h2>V12 Error</h2><pre style="color:#f0b96c;margin-top:12px;white-space:pre-wrap">'+esc(msg)+'</pre></div>';
}
// ─── HTML escaping (prevents user-entered text, e.g. lump-sum labels, from
// being interpreted as markup when we build innerHTML strings) ─────────────
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
// Coerce a raw input value to a finite number, falling back if invalid.
function numOr(v,fallback){var n=+v;return isFinite(n)?n:(fallback||0);}
try{

// ─── Pension engine ────────────────────────────────────────────────────────
function estimateAgePension(p){
  var exA=Math.max(0,p.financialAssets-p.assetThreshold);
  var byA=Math.max(0,p.fullPension-exA*p.assetTaperPerDollar);
  var deemed=p.financialAssets<=p.deemingThreshold
    ?p.financialAssets*p.deemingRateLow
    :p.deemingThreshold*p.deemingRateLow+(p.financialAssets-p.deemingThreshold)*p.deemingRateHigh;
  var byI=Math.max(0,p.fullPension-Math.max(0,deemed-p.incomeFreeArea)*p.incomeTaperRate);
  return Math.min(byA,byI);
}

// ─── Constants ─────────────────────────────────────────────────────────────
var ACTUALS=[
  {age:48,robOpen:462151,tinaOpen:335957},
  {age:49,robOpen:570166,tinaOpen:416543},
  {age:50,robOpen:567311,tinaOpen:419005},
  {age:51,robOpen:652528,tinaOpen:484791},
  {age:52,robOpen:730025,tinaOpen:559116},
  {age:53,robOpen:829122.86,tinaOpen:658880},
  {age:54,robOpen:934773.08,tinaOpen:729006.22}
];
var FINAL_ACTUAL_CLOSE={rob:934773.08,tina:729006.22};
var HORIZON=41;
// BASE_AGE = "this year" (FY2026-27) — the anchor every indexed figure (caps,
// pension thresholds, TBC, CPI-escalated spend) grows forward from. Age 54
// closed out FY25-26 and is now an ACTUAL row (see ACTUALS above), so the
// forecast — and every indexed figure — starts from age 55.
var BASE_AGE=55;
// Concessional cap for a given projection age. Age 54's cap was a one-off
// (their actual, now-historical FY25-26 contribution year, captured in
// ACTUALS rather than modelled here). From age 55 (FY26-27, confirmed
// $32,500) onward this escalates in $2,500 AWOTE-style steps if indexation
// is enabled. NCC annual cap is legislated as 4× this figure.
function ccCapForAge(age,st){
  if(age<BASE_AGE)return 0;
  var base=st.caps.after54;
  if(!st.indexation||!st.indexation.enabled)return base;
  var grown=base*Math.pow(1+st.inflationRate,Math.max(0,age-BASE_AGE));
  return Math.max(base,Math.floor(grown/2500)*2500);
}
function nccCapForAge(age,st){return ccCapForAge(age,st)*4;}
// General Transfer Balance Cap for a given projection age. $2.1m is the
// confirmed 1 July 2026 figure; escalates in $100k steps (CPI-style
// approximation of the real indexation mechanism) if enabled.
function tbcCapForAge(age,st){
  var base=(st.tbc&&st.tbc.cap)||2100000;
  if(!st.indexation||!st.indexation.enabled)return base;
  var grown=base*Math.pow(1+st.inflationRate,Math.max(0,age-BASE_AGE));
  return Math.max(base,Math.round(grown/100000)*100000);
}
// Generic indexation helper for Age Pension thresholds/rates and Div293
// threshold-adjacent figures. Div293's $250k threshold is NOT indexed by law,
// so callers simply don't route it through this function.
function idx(v,age,st){
  if(!st.indexation||!st.indexation.enabled)return v;
  return v*Math.pow(1+st.inflationRate,Math.max(0,age-BASE_AGE));
}
function thirdSize(){return Math.ceil(HORIZON/3);}
function stageIdx(i){var t=thirdSize();return i<t?0:i<t*2?1:2;}
function stageName(s){return['Golden','Silver','Legacy'][s];}

// ─── Default state ─────────────────────────────────────────────────────────
function defaultState(){
  return{
    tab:'super',
    showActuals:true,
    showAllRows:false,
    endAge:90,
    robRetireAge:60,
    tinaRetireAge:60,
    robSeed:FINAL_ACTUAL_CLOSE.rob,
    tinaSeed:FINAL_ACTUAL_CLOSE.tina,
    contribTax:0.15,
    robWorkReturn:0.103,
    tinaWorkReturn:0.103,
    retireReturn:0.08,
    spendMin:50000,
    spendMax:500000,
    spendGolden:290000,
    spendSilver:210000,
    spendLegacy:285000,
    spendPhase:'Golden',
    splitPct:55,
    otherAssetsBuckets:{realestate:500000,shares:0,other:0},
    otherAssetsBucket:'realestate',
    otherAssetsReturn:0.06,
    otherAssetsCpi:0.035,
    otherAssetsRateMode:'yield',
    otherIncomeStartAge:60,
    // Cash flow age 55-60 (before Other Income proper starts at 61) that
    // isn't invested or available for spending — it's going straight to
    // paying down loans/debt. Purely informational: shown in the Other Inc
    // column in a different colour so it's not confused with real invested
    // income, but never added to netSpend, otherIncome, or the pension test.
    debtPaydown:{enabled:true,startAge:55,endAge:60,amount:32000},
    usePension:true,
    homeowner:true,
    // Age Pension figures: 20 Mar 2026 – 19 Sep 2026 Services Australia rates
    // (combined couple, homeowner). Auto-escalate via `indexation` below.
    fullPension:47070,
    assetThreshold:481500,
    assetTaperPerDollar:0.078,
    deemingThreshold:106200,
    deemingRateLow:0.0125,
    deemingRateHigh:0.0325,
    incomeFreeArea:9880,
    incomeTaperRate:0.5,
    showInflationAdj:false,
    inflationRate:0.035,
    showScenarioB:false,
    // Concessional cap: $32,500, the confirmed FY26-27 cap (age 55, the first
    // forecast year — age 54's $30,000 FY25-26 cap is now historical and
    // captured in ACTUALS instead). Escalates further via `indexation`. NCC
    // annual cap is derived as 4× this (currently $130,000).
    caps:{after54:32500},
    // Division 293: extra 15% tax on concessional contributions when
    // (income + CC) exceeds the threshold. The $250k threshold is fixed by
    // law (unindexed since 2017). Off by default — needs each person's
    // taxable income, which this tool doesn't otherwise track.
    div293:{enabled:false,threshold:250000,robIncome:0,tinaIncome:0},
    // General Transfer Balance Cap: $2.1m from 1 July 2026. Balance held
    // above this per person must stay in accumulation phase (earnings taxed
    // at 15%, not the pension-phase 0% this model otherwise assumes).
    tbc:{enabled:true,cap:2100000},
    // Escalates concessional/NCC/TBC caps and Age Pension thresholds each
    // projection year at the CPI rate below, and grows nominal spend figures
    // the same way, so the model stays realistic decades out instead of
    // freezing today's law forever.
    indexation:{enabled:true},
    scenarioB:{
      robWorkReturn:0.08,tinaWorkReturn:0.08,retireReturn:0.06,
      robRetireAge:62,tinaRetireAge:62,
      spendGolden:250000,spendSilver:180000,spendLegacy:250000
    },
    lumpSums:[],
    shock:{enabled:false,type:'crash',magnitude:25,startOffset:1,durationYears:2},
    ncc:{enabled:false,robAnnual:0,tinaAnnual:0,startAge:55,endAge:60},
    partTime:{enabled:false,robAmount:0,robStartAge:60,robEndAge:63,tinaAmount:0,tinaStartAge:60,tinaEndAge:63},
    minDrawdown:{enabled:true,startAge:61},
    pensionBoost:{enabled:false,rate:0.012},
    monteCarlo:{enabled:false,runs:300,stdDev:10},
    goal:{enabled:false,targetBalance:500000},
    netWorth:{homeValue:1500000,homeCpi:0.04},
    collapsed:{returns:false,retirement:false,spending:false,assets:false,pension:true,advanced:true,lumpsums:false,shock:false,ncc:true,parttime:true,montecarlo:true,goal:true,div293:true,tbc:true,debtPaydown:true}
  };
}

// ─── localStorage ──────────────────────────────────────────────────────────
var LS_KEY='supercalc_v12_state';
// Fields whose "correct" value is set by law/indexation/actual account data,
// not personal preference. When migrating from an older save, we drop these
// so the user inherits the freshly-corrected defaults above instead of
// carrying forward whatever was stale in their old browser storage. Fields
// the user is meant to tweak (concessional caps, retirement ages, spend,
// etc.) are preserved. robSeed/tinaSeed are included here because they're
// derived from ACTUALS/FINAL_ACTUAL_CLOSE (real account balances), not a
// user preference — each time the actuals move forward a year, an old save's
// seed would otherwise stay frozen on last year's closing balance forever.
var REGULATORY_KEYS=['fullPension','assetThreshold','assetTaperPerDollar',
  'deemingThreshold','deemingRateLow','deemingRateHigh','incomeFreeArea','incomeTaperRate',
  'robSeed','tinaSeed'];
function stripRegulatoryDefaults(s){
  var out=Object.assign({},s);
  REGULATORY_KEYS.forEach(function(k){delete out[k];});
  // caps.at54 no longer exists as a concept (age 54 is now an ACTUAL row) —
  // drop it explicitly so it doesn't linger as dead data in a migrated save.
  if(out.caps){out.caps=Object.assign({},out.caps);delete out.caps.at54;}
  return out;
}
function loadState(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(!raw){
      var prevKeys=['supercalc_v11_state','supercalc_v10_state','supercalc_v9_state','supercalc_v8_state','supercalc_v7_state'];
      for(var i=0;i<prevKeys.length;i++){
        var old=localStorage.getItem(prevKeys[i]);
        if(old){
          try{
            var s=JSON.parse(old);delete s.tab;
            return deepMerge(defaultState(),stripRegulatoryDefaults(s));
          }catch(e2){/* fall through to next key */}
        }
      }
      return defaultState();
    }
    return deepMerge(defaultState(),JSON.parse(raw));
  }catch(e){return defaultState();}
}
function deepMerge(d,s){
  var out=Object.assign({},d);
  Object.keys(s).forEach(function(k){
    if(k in d&&d[k]!==null&&typeof d[k]==='object'&&!Array.isArray(d[k])&&s[k]!==null&&typeof s[k]==='object'){
      out[k]=deepMerge(d[k],s[k]);
    }else{out[k]=s[k];}
  });
  return out;
}
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}}
function resetState(){localStorage.removeItem(LS_KEY);var t=state.tab;Object.assign(state,defaultState());state.tab=t;render();}

var state=loadState();

// Transient UI state (not saved)
var lsForm={label:'',age:60,amount:100000,who:'both',type:'inflow',downsizer:false};
var lsFormOpen=false;

// ─── DOM helpers ───────────────────────────────────────────────────────────
function el(tag,attrs,children){
  if(!attrs)attrs={};if(!children)children=[];
  var n=document.createElement(tag);
  Object.keys(attrs).forEach(function(k){
    var v=attrs[k];
    if(k==='style'){typeof v==='object'?Object.assign(n.style,v):n.setAttribute('style',v);}
    else if(k.slice(0,2)==='on'&&typeof v==='function'){n.addEventListener(k.slice(2).toLowerCase(),v);}
    else{n.setAttribute(k,String(v));}
  });
  (Array.isArray(children)?children:[children]).forEach(function(c){
    if(c==null)return;
    typeof c==='string'?n.appendChild(document.createTextNode(c)):n.appendChild(c);
  });
  return n;
}
var SVGNS='http://www.w3.org/2000/svg';
function svgEl(tag,a,ch){
  if(!a)a={};if(!ch)ch=[];
  var n=document.createElementNS(SVGNS,tag);
  Object.keys(a).forEach(function(k){
    var v=a[k];
    if(k==='style'){typeof v==='object'?n.setAttribute('style',Object.keys(v).map(function(x){return x+':'+v[x];}).join(';')):n.setAttribute('style',v);}
    else{n.setAttribute(k,String(v));}
  });
  (Array.isArray(ch)?ch:[ch]).forEach(function(c){
    if(c==null)return;
    typeof c==='string'?n.appendChild(document.createTextNode(c)):n.appendChild(c);
  });
  return n;
}
function fmt(n){return'$'+Math.round(n).toLocaleString('en-AU');}
function fmtPct(d){return(d*100).toFixed(2)+'%';}
function fmtPctSigned(d){return(d>=0?'+':'')+(d*100).toFixed(1)+'%';}
function fmtReal(n,yrs){
  if(!state.showInflationAdj)return fmt(n);
  return fmt(n/Math.pow(1+state.inflationRate,yrs))+'*';
}
function otherTotal(){var b=state.otherAssetsBuckets;return(b.realestate||0)+(b.shares||0)+(b.other||0);}

// ─── Min drawdown rates (ATO schedule) ────────────────────────────────────
function minDrawdownRate(age){
  if(age<65)return 0.04;if(age<75)return 0.05;if(age<80)return 0.06;
  if(age<85)return 0.07;if(age<90)return 0.09;return 0.14;
}

// ─── Timeline builder ──────────────────────────────────────────────────────
function buildTimeline(st,returnOverrideFn){
  var rows=[];
  if(st.showActuals){
    ACTUALS.forEach(function(a,i){
      // Year-over-year balance growth from the real closing balances. This is
      // NOT a pure investment-return figure — it also includes that year's
      // concessional contributions, so it will run a few points hotter than
      // the fund's actual market return, especially in earlier years when
      // contributions were a bigger fraction of a smaller balance. Still a
      // useful real-world ballpark for setting the forecast return sliders.
      var prev=i>0?ACTUALS[i-1]:null;
      var robReturn=prev&&prev.robOpen?(a.robOpen/prev.robOpen-1):null;
      var tinaReturn=prev&&prev.tinaOpen?(a.tinaOpen/prev.tinaOpen-1):null;
      var combinedReturn=prev&&(prev.robOpen+prev.tinaOpen)?((a.robOpen+a.tinaOpen)/(prev.robOpen+prev.tinaOpen)-1):null;
      rows.push({age:a.age,phase:'ACTUAL',stage:'',
        robClose:a.robOpen,tinaClose:a.tinaOpen,combinedClose:a.robOpen+a.tinaOpen,
        grossSpend:0,otherIncome:0,pension:0,robSpend:0,tinaSpend:0,
        robCC:0,tinaCC:0,lsRob:0,lsTina:0,lsItems:[],
        robReturn:robReturn,tinaReturn:tinaReturn,combinedReturn:combinedReturn});
    });
  }
  var rBal=st.robSeed,tBal=st.tinaSeed;
  var earliestRetire=Math.min(st.robRetireAge,st.tinaRetireAge);
  var totalOther=otherTotal();
  var robOverTBC=false,tinaOverTBC=false; // set once either balance first exceeds the TBC in pension phase
  for(var age=BASE_AGE;age<=st.endAge;age++){
    var rWork=age<st.robRetireAge,tWork=age<st.tinaRetireAge;
    var rCC=rWork?ccCapForAge(age,st):0;
    var tCC=tWork?ccCapForAge(age,st):0;
    // Division 293: extra 15% tax on concessional contributions when
    // (income + CC) exceeds the (unindexed) threshold. Applied on top of the
    // normal 15% contributions tax, so total tax on the excess is 30%.
    var rDiv293=0,tDiv293=0;
    if(st.div293&&st.div293.enabled){
      var rSurchargeIncome=(st.div293.robIncome||0)+rCC;
      rDiv293=Math.min(rCC,Math.max(0,rSurchargeIncome-st.div293.threshold))*0.15;
      var tSurchargeIncome=(st.div293.tinaIncome||0)+tCC;
      tDiv293=Math.min(tCC,Math.max(0,tSurchargeIncome-st.div293.threshold))*0.15;
    }
    // Accumulation returns
    if(rWork){var nr=rCC*(1-st.contribTax)-rDiv293,br=rBal+nr;rBal=br+br*st.robWorkReturn;}
    if(tWork){var nt=tCC*(1-st.contribTax)-tDiv293,bt=tBal+nt;tBal=bt+bt*st.tinaWorkReturn;}
    // Non-concessional contributions (no tax, any phase)
    var robNCC=0,tinaNCC=0;
    if(st.ncc&&st.ncc.enabled&&age>=st.ncc.startAge&&age<=st.ncc.endAge){
      robNCC=st.ncc.robAnnual||0;tinaNCC=st.ncc.tinaAnnual||0;
      rBal+=robNCC;tBal+=tinaNCC;
    }
    var anyRet=!rWork||!tWork,bothRet=!rWork&&!tWork;
    var yIdx=(anyRet&&age>earliestRetire)?(age-earliestRetire-1):-1;
    var stage=yIdx>=0?stageName(stageIdx(yIdx)):(anyRet&&age===earliestRetire?'Retiring':'');
    // Retirement returns (+ optional pension-phase tax boost).
    // Transfer Balance Cap: any balance above the (indexed) cap can't sit in
    // the tax-free pension phase — it's modelled as remaining in
    // accumulation, so its earnings are taxed at 15% instead of 0%.
    var pb=st.pensionBoost&&st.pensionBoost.enabled?st.pensionBoost.rate||0.012:0;
    var tbcCap=st.tbc&&st.tbc.enabled?tbcCapForAge(age,st):Infinity;
    if(!rWork){
      var rr=(returnOverrideFn?returnOverrideFn(age):st.retireReturn)+pb;
      if(rBal>tbcCap){robOverTBC=true;var rPension=tbcCap,rAccum=rBal-tbcCap;rBal=rBal+rPension*rr+rAccum*rr*(1-0.15);}
      else{rBal=rBal+rBal*rr;}
    }
    if(!tWork){
      var rt=(returnOverrideFn?returnOverrideFn(age):st.retireReturn)+pb;
      if(tBal>tbcCap){tinaOverTBC=true;var tPension=tbcCap,tAccum=tBal-tbcCap;tBal=tBal+tPension*rt+tAccum*rt*(1-0.15);}
      else{tBal=tBal+tBal*rt;}
    }
    // ── Lump sums applied after returns ────────────────────────────────────
    var lsRob=0,lsTina=0,lsItems=[];
    (st.lumpSums||[]).forEach(function(ls){
      if(ls.age!==age)return;
      lsItems.push(ls);
      var sign=ls.type==='outflow'?-1:1;
      var amt=sign*Math.abs(ls.amount);
      if(ls.who==='rob'){lsRob+=amt;}
      else if(ls.who==='tina'){lsTina+=amt;}
      else{lsRob+=amt/2;lsTina+=amt/2;}
    });
    rBal=Math.max(0,rBal+lsRob);
    tBal=Math.max(0,tBal+lsTina);
    // ── Other income ────────────────────────────────────────────────────────
    var otherIncome=0;
    if(anyRet&&age>st.otherIncomeStartAge){
      otherIncome=totalOther*st.otherAssetsReturn*Math.pow(1+st.otherAssetsCpi,age-st.otherIncomeStartAge-1);
    }
    // ── Debt paydown cash (age 55-60, informational only) ──────────────────
    // Not invested, not available to fund spend, doesn't touch the balance,
    // the pension test, or netSpend below — purely noted for the timeline
    // table so it's visible that cash is flowing in during these years, just
    // not into anything this model tracks. Real Other Income (above) starts
    // separately at otherIncomeStartAge+1.
    var debtPaydownCash=0;
    if(st.debtPaydown&&st.debtPaydown.enabled&&age>=st.debtPaydown.startAge&&age<=st.debtPaydown.endAge){
      debtPaydownCash=idx(st.debtPaydown.amount,age,st);
    }
    // ── Age pension ─────────────────────────────────────────────────────────
    // Pension thresholds/rates are indexed forward from today (BASE_AGE) so a
    // 40-year projection doesn't apply 2026 settings unchanged out to age 90.
    var pension=0;
    if(st.usePension&&anyRet&&age>=67){
      pension=estimateAgePension({
        financialAssets:rBal+tBal+totalOther,homeowner:st.homeowner,
        fullPension:idx(st.fullPension,age,st),assetThreshold:idx(st.assetThreshold,age,st),
        assetTaperPerDollar:st.assetTaperPerDollar,deemingThreshold:idx(st.deemingThreshold,age,st),
        deemingRateLow:st.deemingRateLow,deemingRateHigh:st.deemingRateHigh,
        incomeFreeArea:idx(st.incomeFreeArea,age,st),incomeTaperRate:st.incomeTaperRate
      });
    }
    // ── Part-time / phased retirement income ────────────────────────────────
    var ptIncome=0;
    if(st.partTime&&st.partTime.enabled){
      if(age>st.robRetireAge&&age<=st.partTime.robEndAge)ptIncome+=st.partTime.robAmount||0;
      if(age>st.tinaRetireAge&&age<=st.partTime.tinaEndAge)ptIncome+=st.partTime.tinaAmount||0;
    }
    // ── Spend ────────────────────────────────────────────────────────────────
    // Golden/Silver/Legacy sliders are treated as today's dollars and grown
    // to nominal terms at the CPI rate (consistent with the pension/cap
    // indexation above), so the "Real $" display toggle reverses a matching
    // escalation rather than un-inflating a figure that never grew.
    var baseSpend=yIdx>=0?(yIdx<thirdSize()?st.spendGolden:yIdx<thirdSize()*2?st.spendSilver:st.spendLegacy):0;
    var grossSpend=baseSpend>0?idx(baseSpend,age,st):0;
    var netSpend=Math.max(0,grossSpend-pension-otherIncome-ptIncome);
    var rSpend=0,tSpend=0;
    if(netSpend>0){
      if(bothRet){
        var tR=netSpend*(st.splitPct/100),tT=netSpend-tR;
        rSpend=Math.min(rBal,tR);tSpend=Math.min(tBal,tT);
        var rem=netSpend-(rSpend+tSpend);
        if(rem>0){var rE=Math.min(Math.max(0,rBal-rSpend),rem);rSpend+=rE;rem-=rE;tSpend+=Math.min(Math.max(0,tBal-tSpend),rem);}
      }else if(!rWork){rSpend=Math.min(rBal,netSpend);}
      else{tSpend=Math.min(tBal,netSpend);}
    }
    // ── Minimum drawdown enforcement (ATO) ──────────────────────────────────
    if(st.minDrawdown&&st.minDrawdown.enabled&&age>=(st.minDrawdown.startAge||61)){
      var mdRate=minDrawdownRate(age);
      if(!rWork){var robMD=rBal*mdRate;if(robMD>rSpend)rSpend=Math.min(rBal,robMD);}
      if(!tWork){var tinaMD=tBal*mdRate;if(tinaMD>tSpend)tSpend=Math.min(tBal,tinaMD);}
    }
    rBal=Math.max(0,rBal-rSpend);
    tBal=Math.max(0,tBal-tSpend);
    rows.push({age,phase:'FORECAST',stage,
      robClose:rBal,tinaClose:tBal,combinedClose:rBal+tBal,
      grossSpend,otherIncome,debtPaydownCash,pension,ptIncome,robSpend:rSpend,tinaSpend:tSpend,
      robCC:rCC,tinaCC:tCC,robNCC,tinaNCC,rDiv293,tDiv293,
      robOverTBC,tinaOverTBC,tbcCap:isFinite(tbcCap)?tbcCap:null,lsRob,lsTina,lsItems});
  }
  var startAge=st.showActuals?48:BASE_AGE;
  return rows.filter(function(r){return r.age>=startAge;});
}
function buildTimelineB(){
  var sb=Object.assign({},state,state.scenarioB,{caps:state.caps,lumpSums:state.lumpSums});
  return buildTimeline(sb);
}
function buildShockTimeline(){
  if(!state.shock.enabled)return null;
  var er=Math.min(state.robRetireAge,state.tinaRetireAge);
  var shockStart=er+(state.shock.startOffset-1);
  var shockEnd=shockStart+state.shock.durationYears-1;
  var shockRet=state.shock.type==='crash'?-(state.shock.magnitude/100):(state.shock.magnitude/100);
  return buildTimeline(state,function(age){
    if(age>=shockStart&&age<=shockEnd)return shockRet;
    return state.retireReturn;
  });
}

// ─── Monte Carlo ──────────────────────────────────────────────────────────
function buildMonteCarloRows(){
  if(!state.monteCarlo||!state.monteCarlo.enabled)return null;
  var runs=Math.min(state.monteCarlo.runs||300,500);
  var sigma=(state.monteCarlo.stdDev||10)/100;
  var er=Math.min(state.robRetireAge,state.tinaRetireAge);
  var seed=54321;
  function rng(){seed=((seed*1664525+1013904223)>>>0);return seed/4294967296;}
  function randn(){var u=Math.max(1e-9,rng()),v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(6.2831853*v);}
  var ages=[];var sa=state.showActuals?48:BASE_AGE;
  for(var a=sa;a<=state.endAge;a++)ages.push(a);
  var byAge={};ages.forEach(function(a){byAge[a]=[];});
  for(var i=0;i<runs;i++){
    var rm={};
    for(var a=BASE_AGE;a<=state.endAge;a++){
      var mean=a<er?state.robWorkReturn:state.retireReturn;
      rm[a]=Math.max(-0.5,Math.min(0.6,mean+sigma*randn()));
    }
    var ovFn=function(age){return rm[age]!==undefined?rm[age]:state.retireReturn;};
    buildTimeline(state,ovFn).forEach(function(r){if(byAge[r.age])byAge[r.age].push(r.combinedClose);});
  }
  function pct(arr,p){var s=arr.slice().sort(function(a,b){return a-b;});return s[Math.min(Math.floor(p*s.length),s.length-1)]||0;}
  return ages.map(function(a){var v=byAge[a]||[];return{age:a,p10:pct(v,.1),p25:pct(v,.25),p50:pct(v,.5),p75:pct(v,.75),p90:pct(v,.9)};});
}

// ─── Goal solver (binary search) ──────────────────────────────────────────
function solveMaxSpend(targetBalance){
  var lo=0,hi=2000000;
  for(var i=0;i<60;i++){
    var mid=(lo+hi)/2;
    var ratio=mid/Math.max(1,state.spendGolden);
    var st2=Object.assign({},state,{spendGolden:mid,spendSilver:state.spendSilver*ratio,spendLegacy:state.spendLegacy*ratio});
    var fRows=buildTimeline(st2).filter(function(r){return r.phase==='FORECAST';});
    var last=fRows[fRows.length-1];
    // Bug fix: checking only the final row's balance isn't enough. Once a
    // balance hits 0 it stays floored there (see buildDrawdown/buildTimeline),
    // so a spend level that exhausts funds at, say, age 70 looks identical —
    // at age 90 — to a spend level that lasts exactly to age 90 with nothing
    // left. Both satisfied "final balance >= targetBalance" whenever
    // targetBalance was 0, which let the binary search climb all the way to
    // its $2,000,000 upper bound and report that as "sustainable." Now we
    // also require that funds were never exhausted before the final
    // projection year.
    var exhaustedEarly=fRows.some(function(r,idx){return idx<fRows.length-1&&r.combinedClose<=0;});
    var ok=!exhaustedEarly&&last&&last.combinedClose>=targetBalance;
    if(ok)lo=mid;else hi=mid;
  }
  return Math.round(lo/1000)*1000;
}

// ─── Sensitivity grid ─────────────────────────────────────────────────────
function buildSensitivity(){
  var rDeltas=[-0.02,-0.01,0,0.01,0.02];
  var sDeltas=[-50000,-25000,0,25000,50000];
  return{
    rDeltas:rDeltas,sDeltas:sDeltas,
    grid:sDeltas.map(function(sd){
      return rDeltas.map(function(rd){
        var st2=Object.assign({},state,{retireReturn:Math.max(0,state.retireReturn+rd),
          spendGolden:Math.max(0,state.spendGolden+sd),
          spendSilver:Math.max(0,state.spendSilver+sd),
          spendLegacy:Math.max(0,state.spendLegacy+sd)});
        var rows=buildTimeline(st2).filter(function(r){return r.phase==='FORECAST';});
        return rows.length?rows[rows.length-1].combinedClose:0;
      });
    })
  };
}

// ─── Net worth rows ────────────────────────────────────────────────────────
function netWorthRows(rows){
  var er=Math.min(state.robRetireAge,state.tinaRetireAge);
  var hv=state.netWorth?state.netWorth.homeValue:0;
  var hc=state.netWorth?state.netWorth.homeCpi:0.04;
  var oa=otherTotal();
  return rows.filter(function(r){return r.phase==='FORECAST';}).map(function(r){
    var homeEq=state.homeowner&&hv>0?hv*Math.pow(1+hc,r.age-er):0;
    return{age:r.age,superBal:r.combinedClose,home:homeEq,other:oa,total:r.combinedClose+homeEq+oa};
  });
}

      var g=Math.max(0,Math.min(1,val>0?pct+0.5:0));
      var r=Math.max(0,Math.min(1,val<=0?1:1-pct-0.5));
      var bg=val>0?'rgba(93,216,122,'+(0.08+g*0.25)+')':'rgba(240,108,108,'+(0.15+r*0.3)+')';
      row.appendChild(el('td',{style:{padding:'5px 8px',textAlign:'center',background:isBase?'rgba(108,142,240,0.2)':bg,
        color:val>0?'#5dd87a':'#f06c6c',fontWeight:isBase?'900':'700',border:isBase?'1px solid rgba(108,142,240,0.5)':'none'}},
        val>0?'$'+Math.round(val/1000)+'k':val<=0?'Exhausted':'—'));
    });
    tbody.appendChild(row);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  var note=el('div',{style:{fontSize:'10px',color:'#5a6080',marginTop:'5px'}},'Values = combined super balance at age '+state.endAge+'. Blue = base scenario. Return delta applied to retirement return only.');
  wrap.appendChild(note);
  return wrap;
}

// ─── Chart ─────────────────────────────────────────────────────────────────
function balanceChart(rows,rowsB,rowsShock,mcRows){
  var W=980,H=340,pL=72,pR=22,pT=28,pB=42;
  var xMin=rows[0].age,xMax=rows[rows.length-1].age;
  var allVals=rows.map(function(r){return r.combinedClose;});
  if(rowsB)rowsB.forEach(function(r){allVals.push(r.combinedClose);});
  if(rowsShock)rowsShock.forEach(function(r){allVals.push(r.combinedClose);});
  if(mcRows){var mcFcast=mcRows.filter(function(r){return r.age>=BASE_AGE;});if(mcFcast.length){allVals.push(mcFcast[mcFcast.length-1].p90);}}
  var yMax=Math.max.apply(null,allVals)*1.08;
  var xD=(xMax-xMin)||1,yD=yMax||1;
  function xp(a){return pL+((a-xMin)/xD)*(W-pL-pR);}
  function yp(v){return pT+(1-(v/yD))*(H-pT-pB);}
  function mkPath(arr,key){
    return arr.map(function(r,i){return(i===0?'M ':'L ')+xp(r.age).toFixed(1)+' '+yp(r[key]).toFixed(1);}).join(' ');
  }

  var svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H,style:'width:100%;height:auto;display:block;cursor:crosshair'});
  svg.appendChild(svgEl('rect',{x:'0',y:'0',width:String(W),height:String(H),fill:'#0f1117'}));

  // Grid
  for(var gi=0;gi<=4;gi++){
    var gv=yMax*gi/4,gy=yp(gv);
    svg.appendChild(svgEl('line',{x1:String(pL),y1:String(gy),x2:String(W-pR),y2:String(gy),stroke:'rgba(255,255,255,.05)'}));
    svg.appendChild(svgEl('text',{x:String(pL-6),y:String(gy+4),fill:'#5a6080','text-anchor':'end',style:'font-family:monospace;font-size:10px'},fmt(gv)));
  }
  // X labels
  var step=Math.max(1,Math.ceil((xMax-xMin)/8));
  for(var xa=xMin;xa<=xMax;xa+=step){
    svg.appendChild(svgEl('text',{x:String(xp(xa)),y:String(H-pB+16),fill:'#5a6080','text-anchor':'middle',style:'font-family:monospace;font-size:10px'},String(xa)));
  }
  // X axis line
  svg.appendChild(svgEl('line',{x1:String(pL),y1:String(H-pB),x2:String(W-pR),y2:String(H-pB),stroke:'rgba(255,255,255,.1)'}));

  // Retirement markers
  function addMarker(age,label,col){
    if(age<xMin||age>xMax)return;
    var xx=xp(age);
    svg.appendChild(svgEl('line',{x1:String(xx),y1:String(pT),x2:String(xx),y2:String(H-pB),
      stroke:col,'stroke-width':'1','stroke-dasharray':'4,3',opacity:'0.65'}));
    svg.appendChild(svgEl('text',{x:String(xx+3),y:String(pT+11),fill:col,style:'font-size:10px;font-weight:bold'},label));
  }
  addMarker(state.robRetireAge,'Rob '+state.robRetireAge,'#6c8ef0');
  if(state.tinaRetireAge!==state.robRetireAge)addMarker(state.tinaRetireAge,'Tina '+state.tinaRetireAge,'#a06cf0');

  // Monte Carlo band (p10–p90)
  if(mcRows&&mcRows.length>1){
    var mcF=mcRows.filter(function(r){return r.age>=BASE_AGE;});
    if(mcF.length>1){
      var fwd=mcF.map(function(r){return xp(r.age).toFixed(1)+','+yp(r.p90).toFixed(1);}).join(' ');
      var bwd=mcF.slice().reverse().map(function(r){return xp(r.age).toFixed(1)+','+yp(r.p10).toFixed(1);}).join(' ');
      svg.appendChild(svgEl('polygon',{points:fwd+' '+bwd,fill:'rgba(93,216,122,0.08)',stroke:'none'}));
      var fwd25=mcF.map(function(r){return xp(r.age).toFixed(1)+','+yp(r.p75).toFixed(1);}).join(' ');
      var bwd25=mcF.slice().reverse().map(function(r){return xp(r.age).toFixed(1)+','+yp(r.p25).toFixed(1);}).join(' ');
      svg.appendChild(svgEl('polygon',{points:fwd25+' '+bwd25,fill:'rgba(93,216,122,0.10)',stroke:'none'}));
      var medPts=mcF.map(function(r,i){return(i===0?'M ':'L ')+xp(r.age).toFixed(1)+' '+yp(r.p50).toFixed(1);}).join(' ');
      svg.appendChild(svgEl('path',{d:medPts,fill:'none',stroke:'rgba(93,216,122,0.55)','stroke-width':'1.5','stroke-dasharray':'3,3'}));
    }
  }
  // Balance lines
  svg.appendChild(svgEl('path',{d:mkPath(rows,'robClose'),fill:'none',stroke:'#6c8ef0','stroke-width':'2'}));
  svg.appendChild(svgEl('path',{d:mkPath(rows,'tinaClose'),fill:'none',stroke:'#a06cf0','stroke-width':'2'}));
  svg.appendChild(svgEl('path',{d:mkPath(rows,'combinedClose'),fill:'none',stroke:'#5dd87a','stroke-width':'2.5'}));
  if(rowsB){svg.appendChild(svgEl('path',{d:mkPath(rowsB,'combinedClose'),fill:'none',stroke:'#f0b96c','stroke-width':'2','stroke-dasharray':'6,3'}));}
  if(rowsShock){
    var shockCol=state.shock.type==='crash'?'#f06c6c':'#00e5cc';
    svg.appendChild(svgEl('path',{d:mkPath(rowsShock,'combinedClose'),fill:'none',stroke:shockCol,'stroke-width':'2.5','stroke-dasharray':'8,4'}));
    // Shade shock band between base and shock
    var shockPts=rowsShock.map(function(r,i){return xp(r.age).toFixed(1)+','+yp(r.combinedClose).toFixed(1);}).join(' ');
    var basePts=rows.filter(function(r){return r.phase==='FORECAST';}).map(function(r){return xp(r.age).toFixed(1)+','+yp(r.combinedClose).toFixed(1);}).join(' ');
    var er2=Math.min(state.robRetireAge,state.tinaRetireAge);
    var shockStartX=xp(er2+(state.shock.startOffset-1));
    var shockEndX=xp(er2+(state.shock.startOffset-1)+state.shock.durationYears-1);
    svg.appendChild(svgEl('rect',{x:String(shockStartX),y:String(pT),width:String(Math.max(0,shockEndX-shockStartX)),height:String(H-pT-pB),fill:shockCol,opacity:'0.07'}));
  }

  // Lump sum markers on combined line
  rows.forEach(function(r){
    if(!r.lsItems||r.lsItems.length===0)return;
    var cx=xp(r.age),cy=yp(r.combinedClose);
    var netAmt=r.lsRob+r.lsTina;
    var col=netAmt>=0?'#5dd87a':'#f06c6c';
    // Diamond shape
    var d=6;
    var pts=(cx)+','+(cy-d)+' '+(cx+d)+','+(cy)+' '+(cx)+','+(cy+d)+' '+(cx-d)+','+(cy);
    svg.appendChild(svgEl('polygon',{points:pts,fill:col,opacity:'0.9'}));
    // Short label above
    var lbl=r.lsItems.map(function(ls){return ls.label;}).join(', ');
    svg.appendChild(svgEl('text',{x:String(cx),y:String(cy-d-4),fill:col,'text-anchor':'middle',
      style:'font-size:9px;font-weight:bold'},lbl.length>18?lbl.slice(0,17)+'…':lbl));
  });

  // Legend
  var legItems=[{l:'Rob',c:'#6c8ef0'},{l:'Tina',c:'#a06cf0'},{l:'Combined A',c:'#5dd87a'}];
  if(rowsB)legItems.push({l:'Combined B',c:'#f0b96c'});
  if(rowsShock){var sc2=state.shock.type==='crash'?'#f06c6c':'#00e5cc';legItems.push({l:(state.shock.type==='crash'?'Crash':'Boom')+' Shock',c:sc2});}
  if(mcRows)legItems.push({l:'MC Median',c:'rgba(93,216,122,0.7)'});
  legItems.forEach(function(it,j){
    var lx=pL+j*120,ly=H-4;
    svg.appendChild(svgEl('rect',{x:String(lx),y:String(ly-9),width:'10',height:'10',fill:it.c}));
    svg.appendChild(svgEl('text',{x:String(lx+14),y:String(ly),fill:'#c0c5d8',style:'font-size:11px;font-weight:800'},it.l));
  });
  // Lump sum legend item
  if(state.lumpSums.length>0){
    var lx2=pL+legItems.length*120,ly2=H-4;
    var pts2=(lx2+5)+','+(ly2-9)+' '+(lx2+10)+','+(ly2-4)+' '+(lx2+5)+','+(ly2)+' '+(lx2)+','+(ly2-4);
    svg.appendChild(svgEl('polygon',{points:pts2,fill:'#5dd87a'}));
    svg.appendChild(svgEl('text',{x:String(lx2+14),y:String(ly2),fill:'#c0c5d8',style:'font-size:11px;font-weight:800'},'Event'));
  }

  // Crosshair + tooltip
  var cursor=svgEl('line',{x1:'0',y1:String(pT),x2:'0',y2:String(H-pB),stroke:'rgba(255,255,255,.2)','stroke-width':'1',display:'none'});
  svg.appendChild(cursor);
  var tip=document.getElementById('chart-tooltip');

  // Shared by mouse and touch input so the tooltip works on tablets/phones,
  // not just with a mouse hovering the SVG.
  function showTooltip(clientX,clientY){
    var rect=svg.getBoundingClientRect();
    var svgX=(clientX-rect.left)/rect.width*W;
    var ageF=xMin+((svgX-pL)/(W-pL-pR))*(xMax-xMin);
    var age=Math.round(ageF);
    if(age<xMin||age>xMax){hideTooltip();return;}
    var row=rows.filter(function(r){return r.age===age;})[0];
    if(!row){hideTooltip();return;}
    cursor.setAttribute('x1',String(xp(age)));cursor.setAttribute('x2',String(xp(age)));cursor.setAttribute('display','');
    var h='<div style="font-weight:900;margin-bottom:6px;color:#e8eaf0">Age '+age+(row.phase==='ACTUAL'?' <span style="font-size:10px;color:#5dd87a">ACTUAL</span>':'')+'</div>';
    h+='<div style="color:#6c8ef0">Rob: '+fmt(row.robClose)+'</div>';
    h+='<div style="color:#a06cf0">Tina: '+fmt(row.tinaClose)+'</div>';
    h+='<div style="color:#5dd87a;font-weight:700">Combined: '+fmt(row.combinedClose)+'</div>';
    if(row.grossSpend)h+='<div style="color:#f0b96c;margin-top:4px">Spend: '+fmt(row.grossSpend)+'</div>';
    if(row.pension)h+='<div style="color:#f0b96c">Pension: '+fmt(row.pension)+'</div>';
    if(row.lsItems&&row.lsItems.length>0){
      h+='<div style="margin-top:4px;border-top:1px solid #252a3a;padding-top:4px">';
      row.lsItems.forEach(function(ls){
        var sign=ls.type==='outflow'?'-':'+';
        var col=ls.type==='outflow'?'#f06c6c':'#5dd87a';
        h+='<div style="color:'+col+'">'+esc(ls.label)+': '+sign+fmt(ls.amount)+'</div>';
      });
      h+='</div>';
    }
    if(rowsB){var rb=rowsB.filter(function(r){return r.age===age;})[0];if(rb)h+='<div style="color:#f0b96c;margin-top:4px">B Combined: '+fmt(rb.combinedClose)+'</div>';}
    if(mcRows){var mc=mcRows.filter(function(r){return r.age===age;})[0];if(mc){h+='<div style="color:rgba(93,216,122,0.8);margin-top:4px;font-size:11px">MC p10–p90: '+fmt(mc.p10)+' → '+fmt(mc.p90)+'</div>';}}
    if(rowsShock){var rs=rowsShock.filter(function(r){return r.age===age;})[0];if(rs){var sc=state.shock.type==='crash'?'#f06c6c':'#00e5cc';var diff=rs.combinedClose-row.combinedClose;var diffStr=(diff>=0?'+':'')+fmt(Math.abs(diff));h+='<div style="color:'+sc+';margin-top:4px">Shock Combined: '+fmt(rs.combinedClose)+'<br><span style="font-size:10px;opacity:.8">Impact: '+diffStr+'</span></div>';}}
    tip.innerHTML=h;tip.style.display='block';
    tip.style.left=(clientX+14)+'px';tip.style.top=(clientY-20)+'px';
  }
  function hideTooltip(){tip.style.display='none';cursor.setAttribute('display','none');}

  svg.addEventListener('mousemove',function(e){showTooltip(e.clientX,e.clientY);});
  svg.addEventListener('mouseleave',hideTooltip);
  // Touch support: tap-and-drag shows the tooltip at the touch point;
  // lifting the finger hides it, mirroring mouseleave.
  svg.addEventListener('touchstart',function(e){
    if(e.touches&&e.touches.length){e.preventDefault();showTooltip(e.touches[0].clientX,e.touches[0].clientY);}
  },{passive:false});
  svg.addEventListener('touchmove',function(e){
    if(e.touches&&e.touches.length){e.preventDefault();showTooltip(e.touches[0].clientX,e.touches[0].clientY);}
  },{passive:false});
  svg.addEventListener('touchend',hideTooltip);
  svg.addEventListener('touchcancel',hideTooltip);
  return svg;
}

// ─── Adviser narrative ─────────────────────────────────────────────────────
function narrative(rows){
  var er=Math.min(state.robRetireAge,state.tinaRetireAge);
  var aR=rows.filter(function(r){return r.age===er;})[0]||rows[0];
  var a67=rows.filter(function(r){return r.age===67;})[0];
  var a90=rows.filter(function(r){return r.age===90;})[0]||rows[rows.length-1];
  var exh=rows.filter(function(r){return r.phase==='FORECAST'&&r.combinedClose<=0;})[0];
  var tot=otherTotal();
  var oi=rows.filter(function(r){return r.age===state.otherIncomeStartAge+1;})[0];
  var ls=state.lumpSums;
  var lines=[];
  lines.push('<strong>Retirement Outlook — V12 Summary</strong><br><br>');
  lines.push('Rob retires at <strong>age '+state.robRetireAge+'</strong> and Tina at <strong>age '+state.tinaRetireAge+'</strong>, with a combined super balance of <strong>'+fmt(aR.combinedClose)+'</strong> at earliest retirement (Rob '+fmt(aR.robClose)+' | Tina '+fmt(aR.tinaClose)+').<br><br>');
  if(state.robRetireAge<60||state.tinaRetireAge<60){
    lines.push('⚠️ <strong>Below preservation age:</strong> '+(state.robRetireAge<60?'Rob\'s':'')+(state.robRetireAge<60&&state.tinaRetireAge<60?' and ':'')+(state.tinaRetireAge<60?'Tina\'s':'')+' planned retirement age is under the general preservation age of 60 — early access to super requires meeting a condition of release.<br><br>');
  }
  lines.push('Spending is phased: <strong>Golden '+fmt(state.spendGolden)+'</strong> / <strong>Silver '+fmt(state.spendSilver)+'</strong> / <strong>Legacy '+fmt(state.spendLegacy)+'</strong> per year gross, in today\'s dollars'+(state.indexation&&state.indexation.enabled?' (escalated at '+fmtPct(state.inflationRate)+' CPI in the projection)':'')+'. Drawdown is met first from other-asset income, then Age Pension, with the remainder from super.<br><br>');
  if(tot>0&&oi){lines.push('Other assets total <strong>'+fmt(tot)+'</strong>, generating <strong>'+fmt(oi.otherIncome)+'</strong>/yr from age '+(state.otherIncomeStartAge+1)+' ('+fmtPct(state.otherAssetsReturn)+' yield, CPI '+fmtPct(state.otherAssetsCpi)+' p.a.).<br><br>');}
  if(state.usePension&&a67){
    if(a67.pension>0){lines.push('Age Pension estimated at <strong>'+fmt(a67.pension)+'</strong>/yr from age 67.<br><br>');}
    else{lines.push('No Age Pension payable at age 67 — assets exceed threshold. May improve as balances drawdown.<br><br>');}
  }
  if(state.div293&&state.div293.enabled){
    var rDiv293Tot2=rows.filter(function(r){return r.phase==='FORECAST';}).reduce(function(s,r){return s+(r.rDiv293||0);},0);
    var tDiv293Tot2=rows.filter(function(r){return r.phase==='FORECAST';}).reduce(function(s,r){return s+(r.tDiv293||0);},0);
    if(rDiv293Tot2+tDiv293Tot2>0){lines.push('💰 <strong>Division 293 tax modelled:</strong> an extra 15% applies to concessional contributions once income + CC exceeds '+fmt(state.div293.threshold)+'. Lifetime estimate: <strong>'+fmt(rDiv293Tot2+tDiv293Tot2)+'</strong> (Rob '+fmt(rDiv293Tot2)+' | Tina '+fmt(tDiv293Tot2)+').<br><br>');}
  }
  if(state.tbc&&state.tbc.enabled){
    var robTBCRow2=rows.filter(function(r){return r.phase==='FORECAST'&&r.robOverTBC;})[0];
    var tinaTBCRow2=rows.filter(function(r){return r.phase==='FORECAST'&&r.tinaOverTBC;})[0];
    if(robTBCRow2||tinaTBCRow2){lines.push('🏦 <strong>Transfer Balance Cap:</strong> '+(robTBCRow2?'Rob\'s balance exceeds the cap from age '+robTBCRow2.age+'. ':'')+(tinaTBCRow2?'Tina\'s balance exceeds the cap from age '+tinaTBCRow2.age+'. ':'')+'The excess is modelled as remaining in accumulation phase, taxed at 15% on earnings rather than the pension-phase 0%.<br><br>');}
  }
  if(state.shock&&state.shock.enabled){
    var sRows2=buildShockTimeline();
    if(sRows2){
      var shkDir=state.shock.type==='crash'?'crash':'boom';
      var shkImpactNarr=sRows2[sRows2.length-1].combinedClose-a90.combinedClose;
      lines.push('⚡ <strong>Market shock modelled:</strong> '+state.shock.magnitude+'% '+shkDir+' from retirement year +'+state.shock.startOffset+' for '+state.shock.durationYears+' year'+(state.shock.durationYears>1?'s':'')+'. Impact at age '+state.endAge+': <strong>'+(shkImpactNarr>=0?'+':'')+fmt(shkImpactNarr)+'</strong> vs baseline.<br><br>');
    }
  }
  if(ls&&ls.length>0){
    lines.push('<strong>Lump sum events modelled:</strong><br>');
    ls.forEach(function(e){
      var sign=e.type==='outflow'?'-':'+';
      lines.push('• Age '+e.age+': <strong>'+esc(e.label)+'</strong> '+sign+fmt(e.amount)+' ('+esc(e.who)+(e.downsizer?', downsizer':'')+')<br>');
    });
    lines.push('<br>');
  }
  if(exh){lines.push('⚠️ <strong>Funds exhausted at age '+exh.age+'.</strong> Reduce spending, increase returns, or add inflows.<br><br>');}
  else{lines.push('✅ <strong>Funds last to age '+state.endAge+'</strong> with <strong>'+fmt(a90.combinedClose)+'</strong> remaining (Rob '+fmt(a90.robClose)+' | Tina '+fmt(a90.tinaClose)+').<br><br>');}
  lines.push('<em>Returns: Rob '+fmtPct(state.robWorkReturn)+' / Tina '+fmtPct(state.tinaWorkReturn)+' (work), '+fmtPct(state.retireReturn)+' (retirement). Concessional cap: $'+state.caps.after54.toLocaleString()+' (FY26-27, escalating from age '+BASE_AGE+'). Tax '+fmtPct(state.contribTax)+'. Figures nominal unless "Real $" is on; spend and pension/cap thresholds escalate at '+fmtPct(state.inflationRate)+' CPI when indexation is on.</em>');
  return lines.join('');
}

function downloadBlob(text,mime,filename){
  var blob=new Blob([text],{type:mime});
  var url=URL.createObjectURL(blob);
  var a=el('a',{href:url,download:filename,style:{display:'none'}});
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},0);
}

    sbCtrl.appendChild(el('div',{style:{fontSize:'11px',color:'#5a6080',margin:'6px 0 10px'}},'Scenario B uses same lump sums as A. Amber dashed line on chart.'));
    [['B: Rob work return','robWorkReturn'],['B: Tina work return','tinaWorkReturn'],['B: Retirement return','retireReturn']].forEach(function(x){
      sbCtrl.appendChild(sld(x[0],x[1]==='retireReturn'?0:3,15,0.05,sb[x[1]]*100,fmtPct(sb[x[1]]),function(v){sb[x[1]]=v/100;render();}));
    });
    sbCtrl.appendChild(sld('B: Rob retires at',55,70,1,sb.robRetireAge,String(sb.robRetireAge),function(v){sb.robRetireAge=v;render();}));
    sbCtrl.appendChild(sld('B: Tina retires at',55,70,1,sb.tinaRetireAge,String(sb.tinaRetireAge),function(v){sb.tinaRetireAge=v;render();}));
    sbCtrl.appendChild(sld('B: Golden spend',50000,500000,5000,sb.spendGolden,fmt(sb.spendGolden),function(v){sb.spendGolden=v;render();}));
    sbCtrl.appendChild(sld('B: Silver spend',50000,500000,5000,sb.spendSilver,fmt(sb.spendSilver),function(v){sb.spendSilver=v;render();}));
    sbCtrl.appendChild(sld('B: Legacy spend',50000,500000,5000,sb.spendLegacy,fmt(sb.spendLegacy),function(v){sb.spendLegacy=v;render();}));
    rightCol.appendChild(panel('Scenario B Settings',sbCtrl));
    if(rowsB){
      var erB=Math.min(sb.robRetireAge,sb.tinaRetireAge);
      var aRetB=rowsB.filter(function(r){return r.age===erB;})[0]||rowsB[0];
      var a90B=rowsB.filter(function(r){return r.age===90;})[0]||rowsB[rowsB.length-1];
      var exhB=rowsB.filter(function(r){return r.phase==='FORECAST'&&r.combinedClose<=0;})[0];
      var cmp=[
        ['Retire ages','Rob '+state.robRetireAge+' / Tina '+state.tinaRetireAge,'Rob '+sb.robRetireAge+' / Tina '+sb.tinaRetireAge],
        ['Combined at retirement',fmt(aRet.combinedClose),fmt(aRetB.combinedClose)],
        ['Golden spend',fmt(state.spendGolden),fmt(sb.spendGolden)],
        ['Silver spend',fmt(state.spendSilver),fmt(sb.spendSilver)],
        ['Legacy spend',fmt(state.spendLegacy),fmt(sb.spendLegacy)],
        ['Balance at 90',fmt(a90.combinedClose),fmt(a90B.combinedClose)],
        ['Fund exhaustion',exh?'Age '+exh.age:'None',exhB?'Age '+exhB.age:'None']
      ];
      rightCol.appendChild(panel('A vs B Comparison',mkTbl(['Metric','Scenario A','Scenario B'],cmp)));
      rightCol.appendChild(panel('Chart Comparison',balanceChart(rows,rowsB,rowsShock,mcRows)));
    }
  }
}

render();

}catch(e){showFatal(e&&e.message?e.message:String(e),e);}
})();
