<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Superannuation Calculator V7</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f1117;font-family:'DM Sans','Segoe UI',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1a1d27}
::-webkit-scrollbar-thumb{background:#3a3f55;border-radius:3px}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:#2a2f42;outline:none;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#6c8ef0;border:2px solid #0f1117}
input[type=number],input[type=text]{background:#1e2233;border:1px solid #2a3050;border-radius:6px;color:#e8eaf0;padding:6px 10px;font-size:12px;font-family:'DM Mono',monospace;width:100%;outline:none}
input[type=number]:focus,input[type=text]:focus{border-color:#6c8ef0}
select{background:#1e2233;border:1px solid #2a3050;border-radius:6px;color:#e8eaf0;padding:6px 10px;font-size:12px;outline:none;cursor:pointer}
button{font-family:'DM Sans','Segoe UI',sans-serif}
.toggle-btn{cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-size:12px;color:#7a8099;padding:6px 12px;border-radius:6px;border:1px solid #252a3a;background:none;transition:all .2s;white-space:nowrap;user-select:none}
.toggle-btn.on{color:#5dd87a;border-color:rgba(93,216,122,.4);background:rgba(93,216,122,.07)}
tr.actual{background:rgba(93,216,122,.04)}
tr.current{background:rgba(240,185,108,.1)!important;outline:1px solid rgba(240,185,108,.4)}
tr.forecast{background:rgba(108,142,240,.03)}
tr.retired-row{background:rgba(255,255,255,.01);opacity:.75}
tr:hover{background:rgba(255,255,255,.05)!important}
td,th{white-space:nowrap}
.mono{font-family:'DM Mono',monospace}
.pos{color:#5dd87a}.neg{color:#f06c6c}.warn{color:#f0b96c}.muted{color:#5a6080}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.4px}
.pill-actual{background:rgba(93,216,122,.15);color:#5dd87a}
.pill-forecast{background:rgba(108,142,240,.15);color:#6c8ef0}
.pill-current{background:rgba(240,185,108,.2);color:#f0b96c}
/* Collapsible sections */
.section-toggle{width:100%;background:none;border:none;color:#c0c5d8;font-size:12px;font-weight:900;padding:8px 0;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #252a3a;margin-bottom:8px}
.section-toggle:hover{color:#6c8ef0}
.section-toggle .arrow{font-size:10px;transition:transform .2s;color:#5a6080}
.section-toggle.open .arrow{transform:rotate(180deg)}
.section-body{overflow:hidden;transition:max-height .25s ease}
/* Chart tooltip */
#chart-tooltip{position:fixed;background:#1a1d27;border:1px solid #3a3f55;border-radius:8px;padding:10px 14px;font-size:12px;color:#e8eaf0;pointer-events:none;z-index:999;display:none;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
/* Mobile */
@media(max-width:800px){
  .main-grid{grid-template-columns:1fr!important}
  .left-col{position:static!important}
  .cards-grid{grid-template-columns:1fr 1fr!important}
}
@media(max-width:480px){
  .cards-grid{grid-template-columns:1fr!important}
}
@media print{
  body{background:white;color:#111}
  .no-print{display:none!important}
  .card,.card-sm{background:#f8f8f8!important;border:1px solid #ddd!important;box-shadow:none!important}
}
</style>

<body>
<div id="chart-tooltip"></div>
<div id="root"></div>
<script>
(function(){
  function showFatal(msg,err){
    console.error(msg,err||'');
    var root=document.getElementById('root');
    if(!root)return;
    root.innerHTML='<div style="min-height:100vh;padding:32px;background:#0f1117;color:#f06c6c;font-family:monospace"><h2>⚠️ V7 failed to load</h2><div style="color:#f0b96c;margin:10px 0">'+msg+'</div><div style="color:#7a8099">Open DevTools → Console for details.</div></div>';
  }
  try{

// ── Engines ─────────────────────────────────────────────────────────────────
function buildAccumulationSchedule(p){
  var rows=[],balance=p.startBalance;
  for(var age=p.startAge;age<=p.endAge;age++){
    var open=balance,cc=p.concessionalCap,tax=cc*p.contributionsTax,net=cc-tax;
    var before=open+net,ret=before*p.returnRate,close=before+ret;
    rows.push({age,openingBalance:open,concessionalContribution:cc,contributionsTax:tax,netContribution:net,investmentReturn:ret,closingBalance:close});
    balance=close;
  }
  return rows;
}

function buildDrawdownSchedule(p){
  var rows=[],balance=p.startBalance,exhaustedAtAge=null;
  for(var age=p.startAge;age<=p.endAge;age++){
    var open=balance,spend=Math.min(open,p.annualSpend),after=open-spend;
    var ret=after>0?after*p.returnRate:0,close=after+ret;
    if(close<=0&&exhaustedAtAge===null)exhaustedAtAge=age;
    rows.push({age,openingBalance:open,spend,investmentReturn:ret,closingBalance:close});
    balance=Math.max(0,close);
  }
  return{exhaustedAtAge,rows};
}

function estimateAgePension(p){
  var excessA=Math.max(0,p.financialAssets-p.assetThreshold);
  var byAssets=Math.max(0,p.fullPension-excessA*p.assetTaperPerDollar);
  var deemed=p.financialAssets<=p.deemingThreshold
    ?p.financialAssets*p.deemingRateLow
    :p.deemingThreshold*p.deemingRateLow+(p.financialAssets-p.deemingThreshold)*p.deemingRateHigh;
  var byIncome=Math.max(0,p.fullPension-Math.max(0,deemed-p.incomeFreeArea)*p.incomeTaperRate);
  return Math.min(byAssets,byIncome);
}

// ── Constants ────────────────────────────────────────────────────────────────
var ACTUALS=[
  {age:48,robOpen:462151,tinaOpen:335957},
  {age:49,robOpen:570166,tinaOpen:416543},
  {age:50,robOpen:567311,tinaOpen:419005},
  {age:51,robOpen:652528,tinaOpen:484791},
  {age:52,robOpen:730025,tinaOpen:559116},
  {age:53,robOpen:829122.86,tinaOpen:658880}
];
var FINAL_ACTUAL_CLOSE={rob:829122.86,tina:658880};
var HORIZON=41;

function concessionalForAge(age,caps){
  if(age===54)return caps.at54;
  if(age>54)return caps.after54;
  return 0;
}
function thirdSize(){return Math.ceil(HORIZON/3);}
function stageIndex(i){var t=thirdSize();return i<t?0:i<t*2?1:2;}
function stageName(s){return s===0?'Golden':s===1?'Silver':'Legacy';}

// ── Default state factory ────────────────────────────────────────────────────
function defaultState(){
  return{
    tab:'super',
    showActuals:true,
    endAge:90,
    robRetireAge:60,
    tinaRetireAge:60,
    robSeed:FINAL_ACTUAL_CLOSE.rob,
    tinaSeed:FINAL_ACTUAL_CLOSE.tina,
    contribTax:0.15,
    robWorkReturn:0.103,
    tinaWorkReturn:0.103,
    retireReturn:0.08,
    spendMin:50000,
    spendMax:500000,
    spendGolden:290000,
    spendSilver:210000,
    spendLegacy:285000,
    spendPhase:'Golden',
    splitPct:55,
    otherAssets:500000,
    otherAssetsBuckets:{realestate:500000,shares:0,other:0},
    otherAssetsBucket:'realestate',
    otherAssetsReturn:0.06,
    otherAssetsCpi:0.035,
    otherAssetsRateMode:'yield',
    otherIncomeStartAge:60,
    usePension:true,
    homeowner:true,
    fullPension:44855,
    assetThreshold:470000,
    assetTaperPerDollar:0.078,
    deemingThreshold:100000,
    deemingRateLow:0.0025,
    deemingRateHigh:0.0225,
    incomeFreeArea:9000,
    incomeTaperRate:0.5,
    // V7 new
    showInflationAdj:false,
    inflationRate:0.035,
    showScenarioB:false,
    scenarioBLabel:'Scenario B',
    caps:{at54:30000,after54:32500},
    // Scenario B overrides
    scenarioB:{
      robWorkReturn:0.08,
      tinaWorkReturn:0.08,
      retireReturn:0.06,
      robRetireAge:62,
      tinaRetireAge:62,
      spendGolden:250000,
      spendSilver:180000,
      spendLegacy:250000,
    },
    // Section collapsed state
    collapsed:{returns:false,retirement:false,spending:false,assets:false,pension:true,advanced:true}
  };
}

// ── State with localStorage ──────────────────────────────────────────────────
var LS_KEY='supercalc_v7_state';
function loadState(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(!raw)return defaultState();
    var saved=JSON.parse(raw);
    var def=defaultState();
    // Merge saved over defaults so new keys always exist
    function deepMerge(d,s){
      var out=Object.assign({},d);
      Object.keys(s).forEach(function(k){
        if(k in d&&d[k]!==null&&typeof d[k]==='object'&&!Array.isArray(d[k])&&typeof s[k]==='object'&&s[k]!==null){
          out[k]=deepMerge(d[k],s[k]);
        } else {
          out[k]=s[k];
        }
      });
      return out;
    }
    return deepMerge(def,saved);
  }catch(e){return defaultState();}
}
function saveState(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}
}
function resetState(){
  localStorage.removeItem(LS_KEY);
  var s=defaultState();
  s.tab=state.tab;
  Object.assign(state,s);
  render();
}

var state=loadState();

// ── DOM helpers ──────────────────────────────────────────────────────────────
function el(tag,attrs,children){
  if(!attrs)attrs={};if(!children)children=[];
  var n=document.createElement(tag);
  Object.keys(attrs).forEach(function(k){
    var v=attrs[k];
    if(k==='style'){typeof v==='object'?Object.assign(n.style,v):n.setAttribute('style',v);}
    else if(k.indexOf('on')===0&&typeof v==='function'){n.addEventListener(k.slice(2).toLowerCase(),v);}
    else{n.setAttribute(k,String(v));}
  });
  (Array.isArray(children)?children:[children]).forEach(function(c){
    if(c==null)return;
    typeof c==='string'?n.appendChild(document.createTextNode(c)):n.appendChild(c);
  });
  return n;
}
var SVG_NS='http://www.w3.org/2000/svg';
function svgEl(tag,attrs,children){
  if(!attrs)attrs={};if(!children)children=[];
  var n=document.createElementNS(SVG_NS,tag);
  Object.keys(attrs).forEach(function(k){
    var v=attrs[k];
    if(k==='style'){
      typeof v==='object'?n.setAttribute('style',Object.keys(v).map(function(a){return a+':'+v[a];}).join(';')):n.setAttribute('style',v);
    } else {n.setAttribute(k,String(v));}
  });
  (Array.isArray(children)?children:[children]).forEach(function(c){
    if(c==null)return;
    typeof c==='string'?n.appendChild(document.createTextNode(c)):n.appendChild(c);
  });
  return n;
}

function fmt(n){return'$'+Math.round(n).toLocaleString('en-AU');}
function fmtPct(dec){return(dec*100).toFixed(2)+'%';}
function fmtReal(n,yearsFromNow){
  if(!state.showInflationAdj)return fmt(n);
  var real=n/Math.pow(1+state.inflationRate,yearsFromNow);
  return fmt(real)+'*';
}

function otherAssetsTotal(){
  var b=state.otherAssetsBuckets||{};
  return(b.realestate||0)+(b.shares||0)+(b.other||0);
}

// ── Timeline builder ─────────────────────────────────────────────────────────
function buildTimeline(st){
  var rows=[];
  if(st.showActuals){
    for(var i=0;i<ACTUALS.length;i++){
      var a=ACTUALS[i],nx=ACTUALS[i+1];
      var rc=nx?nx.robOpen:FINAL_ACTUAL_CLOSE.rob,tc=nx?nx.tinaOpen:FINAL_ACTUAL_CLOSE.tina;
      rows.push({age:a.age,phase:'ACTUAL',stage:'',robClose:rc,tinaClose:tc,combinedClose:rc+tc,grossSpend:0,otherIncome:0,pension:0,robSpend:0,tinaSpend:0,robCC:0,tinaCC:0});
    }
  }
  var robBal=st.robSeed,tinaBal=st.tinaSeed;
  var earliestRetire=Math.min(st.robRetireAge,st.tinaRetireAge);
  var totalOther=otherAssetsTotal();
  for(var age=54;age<=st.endAge;age++){
    var robWorking=age<st.robRetireAge,tinaWorking=age<st.tinaRetireAge;
    var robCC=robWorking?concessionalForAge(age,st.caps):0;
    var tinaCC=tinaWorking?concessionalForAge(age,st.caps):0;
    if(robWorking){var nR=robCC*(1-st.contribTax),bR=robBal+nR;robBal=bR+bR*st.robWorkReturn;}
    if(tinaWorking){var nT=tinaCC*(1-st.contribTax),bT=tinaBal+nT;tinaBal=bT+bT*st.tinaWorkReturn;}
    var anyRetired=!robWorking||!tinaWorking,bothRetired=!robWorking&&!tinaWorking;
    var yearIndex=(anyRetired&&age>=earliestRetire)?(age-earliestRetire):-1;
    var stage=yearIndex>=0?stageName(stageIndex(yearIndex)):'';
    var otherIncome=0;
    if(anyRetired&&age>=st.otherIncomeStartAge){
      var yrsOI=age-st.otherIncomeStartAge;
      otherIncome=totalOther*st.otherAssetsReturn*Math.pow(1+st.otherAssetsCpi,yrsOI);
    }
    var pension=0;
    if(st.usePension&&anyRetired&&age>=67){
      pension=estimateAgePension({
        financialAssets:robBal+tinaBal+totalOther,homeowner:st.homeowner,
        fullPension:st.fullPension,assetThreshold:st.assetThreshold,assetTaperPerDollar:st.assetTaperPerDollar,
        deemingThreshold:st.deemingThreshold,deemingRateLow:st.deemingRateLow,deemingRateHigh:st.deemingRateHigh,
        incomeFreeArea:st.incomeFreeArea,incomeTaperRate:st.incomeTaperRate
      });
    }
    var grossSpend=yearIndex>=0?(yearIndex<thirdSize()?st.spendGolden:yearIndex<thirdSize()*2?st.spendSilver:st.spendLegacy):0;
    var netSuperSpend=Math.max(0,grossSpend-pension-otherIncome);
    if(!robWorking)robBal=robBal+robBal*st.retireReturn;
    if(!tinaWorking)tinaBal=tinaBal+tinaBal*st.retireReturn;
    var robSpend=0,tinaSpend=0;
    if(netSuperSpend>0){
      if(bothRetired){
        var tR=netSuperSpend*(st.splitPct/100),tT=netSuperSpend-tR;
        robSpend=Math.min(robBal,tR);tinaSpend=Math.min(tinaBal,tT);
        var rem=netSuperSpend-(robSpend+tinaSpend);
        if(rem>0){var rA=Math.max(0,robBal-robSpend),rE=Math.min(rA,rem);robSpend+=rE;rem-=rE;tinaSpend+=Math.min(Math.max(0,tinaBal-tinaSpend),rem);}
      } else if(!robWorking){robSpend=Math.min(robBal,netSuperSpend);}
      else{tinaSpend=Math.min(tinaBal,netSuperSpend);}
    }
    robBal=Math.max(0,robBal-robSpend);
    tinaBal=Math.max(0,tinaBal-tinaSpend);
    rows.push({age,phase:'FORECAST',stage,robClose:robBal,tinaClose:tinaBal,combinedClose:robBal+tinaBal,grossSpend,otherIncome,pension,robSpend,tinaSpend,robCC,tinaCC});
  }
  var startAge=st.showActuals?48:54;
  return rows.filter(function(r){return r.age>=startAge;});
}

// Scenario B timeline uses scenarioB overrides merged onto main state
function buildScenarioBTimeline(){
  var sb=Object.assign({},state,state.scenarioB,{caps:state.caps});
  return buildTimeline(sb);
}

// ── UI Components ────────────────────────────────────────────────────────────
function panel(title,content){
  return el('div',{style:{background:'#161923',border:'1px solid #252a3a',borderRadius:'12px',padding:'14px',marginBottom:'14px'}},[
    el('div',{style:{fontSize:'12px',color:'#7a8099',fontWeight:'900',marginBottom:'10px'}},title),
    content
  ]);
}

function collapsibleSection(key,title,contentFn){
  var isOpen=!state.collapsed[key];
  var btn=el('button',{class:'section-toggle'+(isOpen?' open':''),onClick:function(){
    state.collapsed[key]=!state.collapsed[key];saveState();
    var body=btn.nextSibling;
    var arrow=btn.querySelector('.arrow');
    if(!state.collapsed[key]){body.style.maxHeight=body.scrollHeight+'px';arrow.style.transform='rotate(180deg)';}
    else{body.style.maxHeight='0';arrow.style.transform='rotate(0deg)';}
  }},[title,el('span',{class:'arrow'},'▼')]);
  var body=el('div',{class:'section-body',style:{maxHeight:isOpen?'2000px':'0'}});
  body.appendChild(contentFn());
  var wrap=el('div',{style:{marginBottom:'12px'}});
  wrap.appendChild(btn);wrap.appendChild(body);
  return wrap;
}

function toggle(label,on,onClick){
  return el('button',{style:{padding:'7px 10px',borderRadius:'10px',border:'1px solid #252a3a',background:on?'rgba(93,216,122,.12)':'transparent',color:on?'#5dd87a':'#7a8099',cursor:'pointer',fontWeight:'900',width:'100%',textAlign:'left',marginBottom:'6px'},onClick:onClick},label);
}

function slider(label,min,max,step,value,display,onInput){
  return el('div',{style:{margin:'8px 0'}},[
    el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}},[
      el('div',{style:{fontSize:'12px',color:'#c0c5d8',fontWeight:'700'}},label),
      el('div',{style:{fontSize:'12px',color:'#6c8ef0',fontFamily:'monospace'}},display)
    ]),
    el('input',{type:'range',min:String(min),max:String(max),step:String(step),value:String(value),style:{width:'100%'},onInput:function(e){onInput(+e.target.value);}})
  ]);
}

function numInput(label,value,onInput,opts){
  opts=opts||{};
  var inp=el('input',{type:'number',value:String(value),step:String(opts.step||1),min:String(opts.min||0)});
  inp.addEventListener('change',function(e){onInput(+e.target.value);});
  return el('div',{style:{margin:'6px 0'}},[
    el('div',{style:{fontSize:'12px',color:'#c0c5d8',fontWeight:'700',marginBottom:'3px'}},label),
    inp
  ]);
}

function segBtn(label,active,onClick){
  return el('button',{style:{padding:'5px 10px',borderRadius:'8px',border:'1px solid #252a3a',background:active?'rgba(108,142,240,.18)':'transparent',color:active?'#6c8ef0':'#7a8099',cursor:'pointer',fontWeight:'900',fontSize:'12px'},onClick:onClick},label);
}

function card(title,value,subtitle,color){
  return el('div',{style:{background:'#161923',border:'1px solid #252a3a',borderRadius:'12px',padding:'14px'}},[
    el('div',{style:{fontSize:'11px',color:'#7a8099',fontWeight:'800'}},title),
    el('div',{style:{fontSize:'20px',fontWeight:'900',color:color||'#6c8ef0',marginTop:'5px'}},value),
    el('div',{style:{fontSize:'11px',color:'#5a6080',marginTop:'3px'}},subtitle)
  ]);
}

function mkTable(headers,rows){
  var tbl=el('table',{style:{width:'100%',borderCollapse:'collapse',background:'#0f1117',border:'1px solid #252a3a',borderRadius:'12px',overflow:'hidden',fontSize:'12px'}});
  tbl.appendChild(el('thead',{},[el('tr',{},headers.map(function(h){return el('th',{style:{textAlign:'right',padding:'7px 10px',color:'#7a8099',fontSize:'11px',borderBottom:'1px solid #252a3a'}},h);}))]) );
  var tbody=el('tbody');
  rows.forEach(function(r,i){
    tbody.appendChild(el('tr',{style:{background:i%2===0?'rgba(255,255,255,.02)':'transparent'}},
      r.map(function(cell){return el('td',{style:{textAlign:'right',padding:'7px 10px',fontFamily:'monospace',color:'#c0c5d8',borderBottom:'1px solid rgba(37,42,58,.3)'}},cell);})));
  });
  tbl.appendChild(tbody);return tbl;
}

// ── Chart with tooltips + markers ────────────────────────────────────────────
function balanceChart(rows,rowsB){
  var W=980,H=320,pL=70,pR=20,pT=24,pB=40;
  var ages=rows.map(function(r){return r.age;});
  var xMin=ages[0],xMax=ages[ages.length-1];
  var allVals=rows.map(function(r){return r.combinedClose;});
  if(rowsB)rowsB.forEach(function(r){allVals.push(r.combinedClose);});
  var yMax=Math.max.apply(null,allVals)*1.08;
  var xD=(xMax-xMin)||1,yD=yMax||1;
  function xp(age){return pL+((age-xMin)/xD)*(W-pL-pR);}
  function yp(v){return pT+(1-(v/yD))*(H-pT-pB);}
  function mkPath(arr,key){
    return arr.map(function(r,i){return(i===0?'M ':'L ')+xp(r.age).toFixed(1)+' '+yp(r[key]).toFixed(1);}).join(' ');
  }

  var svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H,style:'width:100%;height:auto;display:block;cursor:crosshair'});
  svg.appendChild(svgEl('rect',{x:'0',y:'0',width:String(W),height:String(H),fill:'#0f1117'}));

  // Grid lines
  for(var i=0;i<=4;i++){
    var v=yMax*i/4,yy=yp(v);
    svg.appendChild(svgEl('line',{x1:String(pL),y1:String(yy),x2:String(W-pR),y2:String(yy),stroke:'rgba(255,255,255,.06)'}));
    svg.appendChild(svgEl('text',{x:String(pL-8),y:String(yy+4),fill:'#5a6080','text-anchor':'end',style:'font-family:monospace;font-size:11px'},fmt(v)));
  }
  // X axis labels
  var ageStep=Math.ceil((xMax-xMin)/8);
  for(var age2=xMin;age2<=xMax;age2+=ageStep){
    svg.appendChild(svgEl('text',{x:String(xp(age2)),y:String(H-pB+16),fill:'#5a6080','text-anchor':'middle',style:'font-family:monospace;font-size:11px'},String(age2)));
  }

  // Retirement markers
  function addMarker(retireAge,label,color){
    if(retireAge<xMin||retireAge>xMax)return;
    var xx=xp(retireAge);
    svg.appendChild(svgEl('line',{x1:String(xx),y1:String(pT),x2:String(xx),y2:String(H-pB),stroke:color,'stroke-width':'1','stroke-dasharray':'4,3',opacity:'0.7'}));
    svg.appendChild(svgEl('text',{x:String(xx+3),y:String(pT+12),fill:color,style:'font-size:10px;font-weight:bold'},label));
  }
  addMarker(state.robRetireAge,'Rob '+state.robRetireAge,'#6c8ef0');
  if(state.tinaRetireAge!==state.robRetireAge)addMarker(state.tinaRetireAge,'Tina '+state.tinaRetireAge,'#a06cf0');

  // Lines – main scenario
  svg.appendChild(svgEl('path',{d:mkPath(rows,'robClose'),fill:'none',stroke:'#6c8ef0','stroke-width':'2'}));
  svg.appendChild(svgEl('path',{d:mkPath(rows,'tinaClose'),fill:'none',stroke:'#a06cf0','stroke-width':'2'}));
  svg.appendChild(svgEl('path',{d:mkPath(rows,'combinedClose'),fill:'none',stroke:'#5dd87a','stroke-width':'2.5'}));

  // Lines – scenario B (dashed)
  if(rowsB){
    svg.appendChild(svgEl('path',{d:mkPath(rowsB,'combinedClose'),fill:'none',stroke:'#f0b96c','stroke-width':'2','stroke-dasharray':'6,3'}));
  }

  // Legend
  var legendItems=[
    {label:'Rob',col:'#6c8ef0'},{label:'Tina',col:'#a06cf0'},{label:'Combined A',col:'#5dd87a'}
  ];
  if(rowsB)legendItems.push({label:'Combined B',col:'#f0b96c',dash:true});
  legendItems.forEach(function(it,j){
    var lx=pL+j*130,ly=H-6;
    svg.appendChild(svgEl('rect',{x:String(lx),y:String(ly-9),width:'10',height:'10',fill:it.col}));
    svg.appendChild(svgEl('text',{x:String(lx+14),y:String(ly),fill:'#c0c5d8',style:'font-size:11px;font-weight:800'},it.label));
  });

  // Tooltip crosshair
  var cursor=svgEl('line',{x1:'0',y1:String(pT),x2:'0',y2:String(H-pB),stroke:'rgba(255,255,255,.25)','stroke-width':'1',display:'none'});
  svg.appendChild(cursor);

  var tip=document.getElementById('chart-tooltip');
  svg.addEventListener('mousemove',function(e){
    var rect=svg.getBoundingClientRect();
    var mx=e.clientX-rect.left;
    var svgX=mx/rect.width*W;
    var ageF=xMin+((svgX-pL)/(W-pL-pR))*(xMax-xMin);
    var age=Math.round(ageF);
    if(age<xMin||age>xMax){tip.style.display='none';cursor.setAttribute('display','none');return;}
    var row=rows.filter(function(r){return r.age===age;})[0];
    if(!row){tip.style.display='none';cursor.setAttribute('display','none');return;}
    cursor.setAttribute('x1',String(xp(age)));cursor.setAttribute('x2',String(xp(age)));cursor.setAttribute('display','');
    var html='<div style="font-weight:900;margin-bottom:6px;color:#e8eaf0">Age '+age+'</div>';
    html+='<div style="color:#6c8ef0">Rob: '+fmt(row.robClose)+'</div>';
    html+='<div style="color:#a06cf0">Tina: '+fmt(row.tinaClose)+'</div>';
    html+='<div style="color:#5dd87a;font-weight:700">Combined: '+fmt(row.combinedClose)+'</div>';
    if(row.grossSpend)html+='<div style="color:#f0b96c;margin-top:4px">Spend: '+fmt(row.grossSpend)+'</div>';
    if(row.pension)html+='<div style="color:#f0b96c">Pension: '+fmt(row.pension)+'</div>';
    if(rowsB){var rb=rowsB.filter(function(r){return r.age===age;})[0];if(rb)html+='<div style="color:#f0b96c;margin-top:4px">B Combined: '+fmt(rb.combinedClose)+'</div>';}
    tip.innerHTML=html;
    tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px';
    tip.style.top=(e.clientY-20)+'px';
  });
  svg.addEventListener('mouseleave',function(){tip.style.display='none';cursor.setAttribute('display','none');});
  return svg;
}

// ── Adviser narrative ────────────────────────────────────────────────────────
function generateNarrative(rows){
  var earliestRetire=Math.min(state.robRetireAge,state.tinaRetireAge);
  var atRetire=rows.filter(function(r){return r.age===earliestRetire;})[0]||rows[0];
  var at67=rows.filter(function(r){return r.age===67;})[0];
  var at90=rows.filter(function(r){return r.age===90;})[0]||rows[rows.length-1];
  var exhausted=rows.filter(function(r){return r.phase==='FORECAST'&&r.combinedClose<=0;})[0];
  var totalOther=otherAssetsTotal();
  var lines=[];
  lines.push('<strong>Retirement Outlook — V7 Summary</strong>');
  lines.push('');
  lines.push('Rob retires at <strong>age '+state.robRetireAge+'</strong> and Tina at <strong>age '+state.tinaRetireAge+'</strong>, with a combined superannuation balance of <strong>'+fmt(atRetire.combinedClose)+'</strong> at earliest retirement (Rob '+fmt(atRetire.robClose)+' | Tina '+fmt(atRetire.tinaClose)+').');
  lines.push('');
  lines.push('Retirement spending is phased across three periods from age '+earliestRetire+': <strong>Golden years</strong> ('+fmt(state.spendGolden)+'/yr), <strong>Silver years</strong> ('+fmt(state.spendSilver)+'/yr), and <strong>Legacy years</strong> ('+fmt(state.spendLegacy)+'/yr). The gross drawdown target is met first from other-asset income, then Age Pension, with the remainder drawn from super.');
  lines.push('');
  if(totalOther>0){
    var oi60=rows.filter(function(r){return r.age===60;})[0];
    lines.push('Other assets total <strong>'+fmt(totalOther)+'</strong>, generating an estimated <strong>'+fmt(oi60?oi60.otherIncome:0)+'</strong> per year from age '+state.otherIncomeStartAge+' ('+fmtPct(state.otherAssetsReturn)+' yield, CPI-indexed at '+fmtPct(state.otherAssetsCpi)+' p.a.).');
    lines.push('');
  }
  if(state.usePension&&at67){
    if(at67.pension>0){
      lines.push('The Age Pension is estimated to contribute <strong>'+fmt(at67.pension)+'</strong> per year from age 67, reducing required super drawdown materially.');
    } else {
      lines.push('At age 67, combined assets exceed the pension assets threshold — <strong>no Age Pension is payable</strong> under current settings. This may change as balances are drawn down.');
    }
    lines.push('');
  }
  if(exhausted){
    lines.push('⚠️ <strong>Funds are projected to be exhausted at age '+exhausted.age+'.</strong> Consider reducing spend, increasing investment returns, or retiring later.');
  } else {
    lines.push('✅ Funds <strong>last through age '+state.endAge+'</strong> with a combined balance of <strong>'+fmt(at90.combinedClose)+'</strong> (Rob '+fmt(at90.robClose)+' | Tina '+fmt(at90.tinaClose)+').');
  }
  lines.push('');
  lines.push('<em>Assumptions: '+fmtPct(state.robWorkReturn)+' working return (Rob), '+fmtPct(state.tinaWorkReturn)+' (Tina), '+fmtPct(state.retireReturn)+' retirement return. Concessional contributions $'+state.caps.at54.toLocaleString()+' at age 54, $'+state.caps.after54.toLocaleString()+' thereafter. Contributions tax '+fmtPct(state.contribTax)+'. All figures nominal.'+(state.showInflationAdj?' Balance figures marked * are in today\'s dollars.':'')+'</em>');
  return lines.join('<br>');
}

  }catch(e){showFatal('Fatal: '+(e&&e.message?e.message:String(e)),e);}
})();
