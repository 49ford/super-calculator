<script>
(function(){
'use strict';
// DOM-built (not innerHTML+inline-onclick) so the Reset button can close
// over LS_KEY safely — inline "onclick" strings run in global scope and
// can't see variables scoped inside this IIFE.
function showFatal(msg,err){
  console.error(msg,err||'');
  var r=document.getElementById('root');
  if(!r)return;
  r.innerHTML='';
  var wrap=document.createElement('div');
  wrap.style.cssText='padding:32px;max-width:640px;margin:0 auto;background:#0f1117;color:#f06c6c;font-family:monospace';
  var h=document.createElement('h2');
  h.textContent='Calculator Error';
  wrap.appendChild(h);
  var p=document.createElement('pre');
  p.style.cssText='color:#f0b96c;margin-top:12px;white-space:pre-wrap;font-size:12px';
  p.textContent=String(msg==null?'Unknown error':msg);
  wrap.appendChild(p);
  var hint=document.createElement('div');
  hint.style.cssText='color:#7a8099;font-size:12px;margin-top:14px;line-height:1.5';
  hint.textContent='Something went wrong, usually from an unusual combination of inputs. Try Reload first — if the problem keeps happening, Reset clears your saved inputs back to the defaults.';
  wrap.appendChild(hint);
  var btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:10px;margin-top:16px';
  var reloadBtn=document.createElement('button');
  reloadBtn.type='button';
  reloadBtn.textContent='Just Reload';
  reloadBtn.style.cssText='padding:8px 16px;border-radius:8px;border:1px solid #3a3f55;background:transparent;color:#e8eaf0;cursor:pointer;font-weight:700;font-family:inherit';
  reloadBtn.addEventListener('click',function(){location.reload();});
  var resetBtn=document.createElement('button');
  resetBtn.type='button';
  resetBtn.textContent='Reset & Reload';
  resetBtn.style.cssText='padding:8px 16px;border-radius:8px;border:1px solid #f06c6c;background:rgba(240,108,108,.1);color:#f06c6c;cursor:pointer;font-weight:700;font-family:inherit';
  resetBtn.addEventListener('click',function(){
    try{localStorage.removeItem(LS_KEY);}catch(e){}
    location.reload();
  });
  btnRow.appendChild(reloadBtn);
  btnRow.appendChild(resetBtn);
  wrap.appendChild(btnRow);
  r.appendChild(wrap);
}
// ─── HTML escaping (prevents user-entered text, e.g. lump-sum labels, from
// being interpreted as markup when we build innerHTML strings) ─────────────
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
// Coerce a raw input value to a finite number, falling back if invalid.
// Strips a leading currency symbol, thousands commas, and stray whitespace
// first, so a pasted/typed "$50,000" resolves to 50000 instead of silently
// falling back to 0 with no feedback.
function numOr(v,fallback){
  if(typeof v==='string')v=v.replace(/[$,\s]/g,'');
  var n=+v;
  return isFinite(n)?n:(fallback||0);
}
try{

// ─── Pension engine ────────────────────────────────────────────────────────
function estimateAgePension(p){
  // Assets test: ALL assessable assets (financial + investment property).
  var totalAssets=p.totalAssets!=null?p.totalAssets:p.financialAssets;
  var exA=Math.max(0,totalAssets-p.assetThreshold);
  var byA=Math.max(0,p.fullPension-exA*p.assetTaperPerDollar);
  // Income test: deeming applies to FINANCIAL assets only (super, shares,
  // cash) - NOT investment property, whose actual rent (plus any employment
  // income above the Work Bonus) is assessed directly via assessedIncome.
  var fa=p.financialAssets;
  var deemed=fa<=p.deemingThreshold
    ?fa*p.deemingRateLow
    :p.deemingThreshold*p.deemingRateLow+(fa-p.deemingThreshold)*p.deemingRateHigh;
  var totalInc=deemed+(p.assessedIncome||0);
  var byI=Math.max(0,p.fullPension-Math.max(0,totalInc-p.incomeFreeArea)*p.incomeTaperRate);
  return Math.min(byA,byI);
}

// ─── Constants ─────────────────────────────────────────────────────────────
// Blank template: no historical actuals baked in. Anyone using this
// calculator enters their own current balances under "Starting Point"
// below — nothing personal is hardcoded here.
var ACTUALS=[];
var FINAL_ACTUAL_CLOSE={rob:0,tina:0};
// The calendar year this page is being used in, expressed as the
// Australian financial-year-END year (FY runs 1 July - 30 June, and is
// conventionally named after the year it ends in - e.g. the FY starting
// July 2026 is "FY2026-27", called "2027" here). Using the FY-end year
// rather than the raw calendar year means the very first forecast row
// (this financial year, still in progress) is always labelled with the
// year it actually completes in - so opening the page partway through a
// financial year doesn't make it look like an extra year of growth has
// already happened this calendar year. Every "Year" shown in the
// Timeline/chart is computed from this plus each person's current age,
// so the tool stays correct on its own without anyone updating it by hand.
var _today=new Date();
var START_YEAR=_today.getFullYear()+(_today.getMonth()>=6?1:0); // getMonth() 0-indexed: 6=July
// Every row/chart/table in this app is keyed by "your age" (robAge) as its
// x-axis — that's what `age` means everywhere below unless a variable is
// explicitly named tinaAge/partnerAge. Two people can have different
// current ages, so a Partner-space age (e.g. state.tinaRetireAge) can't be
// compared directly against a robAge value — it has to be translated first.
function yearForAge(age){return START_YEAR+(age-state.startAge);}
// Years from now until a given person (their current age + their target
// retirement age) retires. Comparing these — not the raw retirement ages —
// is what actually tells you who retires in the earlier calendar year.
function yearsToRetire(personStartAge,personRetireAge){return personRetireAge-personStartAge;}
function earliestRetireYearOffset(st){
  if(!st.hasPartner)return yearsToRetire(st.startAge,st.robRetireAge);
  return Math.min(yearsToRetire(st.startAge,st.robRetireAge),yearsToRetire(st.tinaStartAge,st.tinaRetireAge));
}
// Your age (robAge) in the year Other Assets income actually switches on —
// depends on whichever retirement happens first plus the configurable
// otherIncomeStartOffset, so (unlike a fixed age) it moves automatically
// with whatever retirement ages/offset are currently set. Used anywhere
// the UI/adviser notes need to show this as a concrete age.
function otherIncomeStartAge(st){
  return st.startAge+earliestRetireYearOffset(st)+1+(st.otherIncomeStartOffset||0);
}
// Translate a Partner-space age (e.g. state.tinaRetireAge, or an age at
// which some Partner-specific event happens) into the equivalent robAge —
// i.e. what your age will be at that same calendar point — so it can be
// plotted/compared on the shared robAge x-axis used throughout.
function ageEquivalent(st,partnerAge){return st.startAge+(partnerAge-st.tinaStartAge);}
// Display names — optional. If left blank, everything falls back to the
// generic "You"/"Partner" labels used throughout the app (table headers,
// chart legend/markers/tooltip, adviser notes, control labels). nameYou()/
// namePartner() are used wherever the name stands alone (labels, legends);
// possYou()/possPartner() are used wherever a possessive form reads better
// ("Your balance..." / "Rob's balance...").
function nameYou(){var n=(state.yourName||'').trim();return n||'You';}
function namePartner(){var n=(state.partnerName||'').trim();return n||'Partner';}
function possYou(){var n=(state.yourName||'').trim();return n?n+"'s":'Your';}
function possPartner(){var n=(state.partnerName||'').trim();return n?n+"'s":"Partner's";}
// Verb agreement helper: "You retire" (2nd person) reads fine for the
// generic "You" label, but once a real name is entered it needs 3rd-person
// "<Name> retires" — same idea for other person-referring verbs.
function verbYou(base,thirdPerson){return (state.yourName||'').trim()?thirdPerson:base;}
// Concessional cap for a given projection age. Age 54's cap was a one-off
// (their actual, now-historical FY25-26 contribution year, captured in
// ACTUALS rather than modelled here). From age 55 (FY26-27, confirmed
// $32,500) onward this escalates in $2,500 AWOTE-style steps if indexation
// is enabled. NCC annual cap is legislated as 4× this figure.
function ccCapForAge(age,st){
  if(age<st.startAge)return 0;
  var base=st.caps.after54;
  if(!st.indexation||!st.indexation.enabled)return base;
  var grown=base*Math.pow(1+st.inflationRate,Math.max(0,age-st.startAge));
  return Math.max(base,Math.floor(grown/2500)*2500);
}
function nccCapForAge(age,st){return ccCapForAge(age,st)*4;}
// Actual concessional contribution made in a given projection year — as
// distinct from ccCapForAge() above, which is just the legislated ceiling.
// Not everyone contributes right up to the cap (e.g. standard employer
// Super Guarantee on a modest income is often well under it). Two input
// modes, per person: 'income' derives the contribution from income × SG
// rate plus any extra salary-sacrifice/voluntary amount; 'total' is a flat
// $ figure. Both are escalated the same way spend is (idx(), today's-$ ->
// nominal) so a "total" left at its default (= the cap's base figure)
// keeps tracking the escalating cap exactly, reproducing this tool's
// original behaviour of contributing right up to the cap every year.
// Either way, whatever's actually contributed can never exceed the cap.
function contribForPerson(mode,income,extra,total,age,st,carryForwardAvailable){
  var desired=mode==='income'?idx(income,age,st)*st.sgRate+idx(extra,age,st):idx(total,age,st);
  // carryForwardAvailable (optional) adds unused concessional cap banked
  // from earlier years on top of this year's standard cap — see the
  // carry-forward ledger maintained in buildTimeline().
  var cap=ccCapForAge(age,st)+(carryForwardAvailable||0);
  return Math.max(0,Math.min(desired,cap));
}
// General Transfer Balance Cap for a given projection age. $2.1m is the
// confirmed 1 July 2026 figure; escalates in $100k steps (CPI-style
// approximation of the real indexation mechanism) if enabled.
function tbcCapForAge(age,st){
  var base=(st.tbc&&st.tbc.cap)||2100000;
  if(!st.indexation||!st.indexation.enabled)return base;
  var grown=base*Math.pow(1+st.inflationRate,Math.max(0,age-st.startAge));
  return Math.max(base,Math.round(grown/100000)*100000);
}
// Generic indexation helper for Age Pension thresholds/rates and Div293
// threshold-adjacent figures. Div293's $250k threshold is NOT indexed by law,
// so callers simply don't route it through this function.
function idx(v,age,st){
  if(!st.indexation||!st.indexation.enabled)return v;
  return v*Math.pow(1+st.inflationRate,Math.max(0,age-st.startAge));
}
// Golden/Silver/Legacy phase lengths are user-adjustable (spendYearsGolden,
// spendYearsSilver) rather than a fixed rigid split of the horizon — Legacy
// is simply whatever's left after Golden+Silver years have elapsed, however
// long or short that ends up being for a given retirement age/horizon.
function stageIdx(yIdx,st){
  var g=Math.max(0,st.spendYearsGolden||0),s=Math.max(0,st.spendYearsSilver||0);
  return yIdx<g?0:yIdx<g+s?1:2;
}
function stageName(s){return['Golden','Silver','Legacy'][s];}

// ─── Default state ─────────────────────────────────────────────────────────
function defaultState(){
  return{
    tab:'super',
    showActuals:false,
    showAllRows:false,
    // Optional display names. Blank = falls back to "You"/"Partner"
    // everywhere (table headers, chart, adviser notes, control labels).
    yourName:'',
    partnerName:'',
    // Single-person mode. When false, every partner-side control, column,
    // chart line/marker/legend item and adviser-note mention is hidden, and
    // buildTimeline() zeroes out all partner balance/contribution/income
    // flows so the projection is exactly a single-person calculation.
    hasPartner:true,
    // Your and your partner's current ages — can differ. Every "Year" shown
    // in the Timeline/chart is computed from YOUR age (startAge); Partner's
    // age each year is tracked separately (startAge + years elapsed vs
    // tinaStartAge + years elapsed), so two different current ages produce
    // two different retirement calendar years, accumulation windows, and
    // ATO minimum-drawdown/Age-Pension-eligibility triggers. Australian
    // super law (preservation age, Age Pension eligibility, minimum
    // drawdown bands) runs on each person's real age under the hood; only
    // the display is calendar-year based.
    startAge:45,
    tinaStartAge:45,
    endAge:90,
    robRetireAge:60,
    tinaRetireAge:60,
    // Blank — enter your own current super balances under "Starting Point".
    robSeed:0,
    tinaSeed:0,
    contribTax:0.15,
    // Defaults are middle-of-the-road for a typical Australian household:
    // ~7.5% p.a. accumulation returns (balanced fund, after fees and the
    // ~15% earnings tax), 6.5% in retirement, and spending phased down
    // from a comfortable starting level (see ASFA Retirement Standard).
    robWorkReturn:0.075,
    tinaWorkReturn:0.075,
    retireReturn:0.065,
    spendMin:20000,
    spendMax:500000,
    spendGolden:90000,
    spendSilver:75000,
    spendLegacy:65000,
    spendPhase:'Golden',
    // How many years each spend phase runs before rolling to the next.
    // Legacy has no explicit length — it's simply whatever's left once
    // Golden+Silver years have elapsed, however long or short that is for a
    // given retirement age and horizon. Defaults (14/14) match the old fixed
    // even-thirds split this replaced.
    spendYearsGolden:14,
    spendYearsSilver:14,
    splitPct:55,
    otherAssetsBuckets:{realestate:0,shares:0,other:0},
    otherAssetsBucket:'realestate',
    otherAssetsReturn:0.06,
    otherAssetsCpi:0.035,
    otherAssetsRateMode:'yield',
    // Other Assets income switches on once someone's actually retired
    // (anyRet), this many years after that first retirement — 0 = starts
    // the same year retirement begins. Replaces the old fixed-age trigger.
    otherIncomeStartOffset:0,
    usePension:true,
    homeowner:true,
    // Age Pension figures: 20 Mar 2026 – 19 Sep 2026 Services Australia rates
    // (combined couple, homeowner). Auto-escalate via `indexation` below.
    fullPension:47070,
    assetThreshold:499000,
    assetTaperPerDollar:0.078,
    deemingThreshold:110600,
    deemingRateLow:0.0125,
    deemingRateHigh:0.0325,
    incomeFreeArea:10296,
    incomeTaperRate:0.5,
    showInflationAdj:false,
    inflationRate:0.035,
    showScenarioB:false,
    // Concessional cap: $32,500, the confirmed FY26-27 cap (age 55, the first
    // forecast year — age 54's $30,000 FY25-26 cap is now historical and
    // captured in ACTUALS instead). Escalates further via `indexation`. NCC
    // annual cap is derived as 4× this (currently $130,000).
    caps:{after54:32500},
    // How much is ACTUALLY contributed concessionally each working year —
    // separate from the legislated cap above, which is just a ceiling. Not
    // everyone contributes right up to the cap (e.g. standard employer Super
    // Guarantee on a modest income is often well under it). Two ways to
    // estimate it, per person: 'income' derives it from income × SG rate
    // plus any extra salary-sacrifice/voluntary amount; 'total' is just a
    // flat $ figure. Either way the actual contribution used in the
    // projection is capped at the legislated cap (escalating caps.after54).
    // Defaults reproduce the tool's original behaviour (contributing right
    // up to the cap every year) so nothing changes unless this is touched.
    contribMode:'income',
    sgRate:0.12,
    robIncome:100000,
    tinaIncome:100000,
    robExtraContrib:0,
    tinaExtraContrib:0,
    robContribTotal:32500,
    tinaContribTotal:32500,
    // Carry-forward concessional cap (since 1 July 2018): if Total Super
    // Balance was under $500k at last 30 June, unused cap from the
    // preceding 5 financial years can be added to this year's cap. The
    // tool can't know your real pre-projection history, so the *Seed
    // fields let you enter your own known unused-cap figure (from myGov)
    // as a starting balance; the model tracks it forward automatically
    // from there. Off by default — a fairly advanced, occasional-use case.
    ccCarryForward:{enabled:false},
    robCarryForwardSeed:0,
    tinaCarryForwardSeed:0,
    // Insurance premiums (life/TPD/income protection) paid from the
    // balance — distinct from admin/investment fees, which should already
    // be netted out of the work/retirement return assumptions below.
    // Modelled only during working years, since cover is commonly
    // cancelled at retirement; set to 0 if not applicable.
    robInsurancePremium:0,
    tinaInsurancePremium:0,
    // Division 293: extra 15% tax on concessional contributions when
    // (income + CC) exceeds the threshold. The $250k threshold is fixed by
    // law (unindexed since 2017). Off by default — needs each person's
    // taxable income, which this tool doesn't otherwise track.
    div293:{enabled:false,threshold:250000,robIncome:0,tinaIncome:0},
    // General Transfer Balance Cap: $2.1m from 1 July 2026. Balance held
    // above this per person must stay in accumulation phase (earnings taxed
    // at 15%, not the pension-phase 0% this model otherwise assumes).
    tbc:{enabled:true,cap:2100000},
    // Escalates concessional/NCC/TBC caps and Age Pension thresholds each
    // projection year at the CPI rate below, and grows nominal spend figures
    // the same way, so the model stays realistic decades out instead of
    // freezing today's law forever.
    indexation:{enabled:true},
    scenarioB:{
      robWorkReturn:0.06,tinaWorkReturn:0.06,retireReturn:0.05,
      robRetireAge:62,tinaRetireAge:62,
      spendGolden:80000,spendSilver:65000,spendLegacy:60000
    },
    lumpSums:[],
    shock:{enabled:false,type:'crash',magnitude:25,startOffset:1,durationYears:2},
    ncc:{enabled:false,robAnnual:0,tinaAnnual:0,startAge:55,endAge:60},
    partTime:{enabled:false,robAmount:0,robStartAge:60,robEndAge:63,tinaAmount:0,tinaStartAge:60,tinaEndAge:63},
    minDrawdown:{enabled:true,startAge:61},
    pensionBoost:{enabled:false,rate:0.012},
    monteCarlo:{enabled:false,runs:300,stdDev:10},
    goal:{enabled:false,targetBalance:500000},
    // Which variable the Sensitivity grid's row axis stress-tests: 'spend'
    // (Golden/Silver/Legacy $ deltas, the original behaviour) or 'retireAge'
    // (both retirement ages shifted together by the same number of years).
    // Column axis is always retirement-return delta.
    sensitivityAxis:'spend',
    netWorth:{homeValue:0,homeCpi:0.04},
    // "advanced" (Concessional Contributions & Caps) defaults OPEN, unlike
    // the other advanced/niche sections below — it holds the actual
    // contribution amount (income x SG% + extra, or a flat total), which is
    // core setup everyone needs, not an occasional-use feature. Collapsed by
    // default it looks like the control has vanished rather than just being
    // tucked away.
    collapsed:{starting:false,contrib:false,returns:false,retirement:false,spending:false,assets:false,pension:true,advanced:true,lumpsums:false,shock:false,ncc:true,parttime:true,montecarlo:true,goal:true,div293:true,tbc:true}
  };
}

// ─── localStorage ──────────────────────────────────────────────────────────
// Age Pension parameter sets (Services Australia, thresholds current from
// 1 July 2026; rates 20 Mar-19 Sep 2026). Auto-selected by household type
// (single vs couple) and homeowner status. The taper rate and deeming RATES
// don't vary by household, only these four figures do.
var PENSION_RATES={
  couple:{fullPension:47070,assetHome:499000,assetNonHome:766000,deemingThreshold:110600,incomeFreeArea:10296},
  single:{fullPension:31223,assetHome:333000,assetNonHome:600000,deemingThreshold:66800,incomeFreeArea:5876}
};
function applyPensionDefaults(st){
  var r=st.hasPartner?PENSION_RATES.couple:PENSION_RATES.single;
  st.fullPension=r.fullPension;
  st.assetThreshold=st.homeowner?r.assetHome:r.assetNonHome;
  st.deemingThreshold=r.deemingThreshold;
  st.incomeFreeArea=r.incomeFreeArea;
}
var LS_KEY='super_calculator_generic_v1_state';
// Fields whose "correct" value is set by law/indexation, not personal
// preference — refreshed on every load so a stale saved value never wins
// over the current legislated figure. Fields the user is meant to tweak
// (starting balances, retirement ages, spend, etc.) are preserved as-is.
var REGULATORY_KEYS=['fullPension','assetThreshold','assetTaperPerDollar',
  'deemingThreshold','deemingRateLow','deemingRateHigh','incomeFreeArea','incomeTaperRate'];
function loadState(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(!raw)return defaultState();
    var merged=deepMerge(defaultState(),JSON.parse(raw));
    // Actually apply the regulatory refresh described above (previously this
    // list was defined but never used, so stale saved thresholds survived
    // reloads). Then re-derive the household-specific pension figures.
    var d=defaultState();
    REGULATORY_KEYS.forEach(function(k){merged[k]=d[k];});
    applyPensionDefaults(merged);
    return merged;
  }catch(e){return defaultState();}
}
function deepMerge(d,s){
  var out=Object.assign({},d);

    if(k in d&&d[k]!==null&&typeof d[k]==='object'&&!Array.isArray(d[k])&&s[k]!==null&&typeof s[k]==='object'){
      out[k]=deepMerge(d[k],s[k]);
    }else{out[k]=s[k];}
  });
  return out;
}
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}}
function resetState(){localStorage.removeItem(LS_KEY);var t=state.tab;Object.assign(state,defaultState());state.tab=t;render();}

var state=loadState();

// Transient UI state (not saved)
var lsForm={label:'',age:60,amount:100000,who:'both',type:'inflow',downsizer:false};
var lsFormOpen=false;

// ─── DOM helpers ───────────────────────────────────────────────────────────
function el(tag,attrs,children){
  if(!attrs)attrs={};if(!children)children=[];
  var n=document.createElement(tag);
  Object.keys(attrs).forEach(function(k){
    var v=attrs[k];
    if(k==='style'){typeof v==='object'?Object.assign(n.style,v):n.setAttribute('style',v);}
    else if(k.slice(0,2)==='on'&&typeof v==='function'){n.addEventListener(k.slice(2).toLowerCase(),v);}
    else{n.setAttribute(k,String(v));}
  });
  (Array.isArray(children)?children:[children]).forEach(function(c){
    if(c==null)return;
    typeof c==='string'?n.appendChild(document.createTextNode(c)):n.appendChild(c);
  });
  return n;
}
var SVGNS='http://www.w3.org/2000/svg';
function svgEl(tag,a,ch){
  if(!a)a={};if(!ch)ch=[];
  var n=document.createElementNS(SVGNS,tag);
  Object.keys(a).forEach(function(k){
    var v=a[k];
    if(k==='style'){typeof v==='object'?n.setAttribute('style',Object.keys(v).map(function(x){return x+':'+v[x];}).join(';')):n.setAttribute('style',v);}
    else{n.setAttribute(k,String(v));}
  });
  (Array.isArray(ch)?ch:[ch]).forEach(function(c){
    if(c==null)return;

  });

}
function fmt(n){return'$'+Math.round(n).toLocaleString('en-AU');}
function fmtPct(d){return(d*100).toFixed(2)+'%';}
function fmtPctSigned(d){return(d>=0?'+':'')+(d*100).toFixed(1)+'%';}
function fmtReal(n,yrs){
  if(!state.showInflationAdj)return fmt(n);
  return fmt(n/Math.pow(1+state.inflationRate,yrs))+'*';
}
function otherTotal(){var b=state.otherAssetsBuckets;return(b.realestate||0)+(b.shares||0)+(b.other||0);}

// ─── Min drawdown rates (ATO schedule) ────────────────────────────────────
function minDrawdownRate(age){
  if(age<65)return 0.04;if(age<75)return 0.05;if(age<80)return 0.06;
  if(age<85)return 0.07;if(age<90)return 0.09;if(age<95)return 0.11;return 0.14;
}

// ─── Timeline builder ──────────────────────────────────────────────────────
function buildTimeline(st,returnOverrideFn){
  var rows=[];
  if(st.showActuals){
    ACTUALS.forEach(function(a,i){
      // Year-over-year balance growth from the real closing balances. This is
      // NOT a pure investment-return figure — it also includes that year's
      // concessional contributions, so it will run a few points hotter than
      // the fund's actual market return, especially in earlier years when
      // contributions were a bigger fraction of a smaller balance. Still a
      // useful real-world ballpark for setting the forecast return sliders.
      var prev=i>0?ACTUALS[i-1]:null;
      var robReturn=prev&&prev.robOpen?(a.robOpen/prev.robOpen-1):null;
      var tinaReturn=prev&&prev.tinaOpen?(a.tinaOpen/prev.tinaOpen-1):null;
      var combinedReturn=prev&&(prev.robOpen+prev.tinaOpen)?((a.robOpen+a.tinaOpen)/(prev.robOpen+prev.tinaOpen)-1):null;
      rows.push({age:a.age,phase:'ACTUAL',stage:'',
        robClose:a.robOpen,tinaClose:a.tinaOpen,combinedClose:a.robOpen+a.tinaOpen,
        grossSpend:0,otherIncome:0,pension:0,robSpend:0,tinaSpend:0,
        robCC:0,tinaCC:0,lsRob:0,lsTina:0,lsItems:[],
        robReturn:robReturn,tinaReturn:tinaReturn,combinedReturn:combinedReturn});
    });
  }
  var rBal=st.robSeed,tBal=st.hasPartner?st.tinaSeed:0;
  // Carry-forward concessional cap ledger: a rolling list of {age,unused}
  // entries, each dropped once more than 5 years old. Seeded from the
  // user's own myGov figure (if entered) so it's usable from year one.
  var rCarryLedger=(st.robCarryForwardSeed>0)?[{age:st.startAge-1,unused:st.robCarryForwardSeed}]:[];
  var tinaCarryLedger=(st.hasPartner&&st.tinaCarryForwardSeed>0)?[{age:st.tinaStartAge-1,unused:st.tinaCarryForwardSeed}]:[];
  // Earliest retirement expressed as a year-offset from now (NOT a raw age
  // comparison — with two different current ages, whoever has the smaller
  // "years until their retirement age" gap retires first in calendar time,
  // regardless of whose retirement age number is numerically smaller).
  var earliestRetireOffset=earliestRetireYearOffset(st);
  var totalOther=otherTotal();
  var robOverTBC=false,tinaOverTBC=false; // set once either balance first exceeds the TBC in pension phase
  // ATO minimum drawdown can force more out of super than the year's desired
  // spend actually needs. That excess doesn't vanish — in reality it gets
  // reinvested outside super — but until now the model just shrank the super
  // balance with nowhere for the cash to go. Track it as a simple shadow
  // balance, assumed reinvested at the same retirement return rate, so it
  // shows up as real household wealth (Net Worth chart/rows, CSV) instead of
  // disappearing.
  var excessMDBal=0;
  // `age` is always "your age" (robAge) — the shared x-axis every row/chart
  // is keyed by. `tinaAge` tracks Partner's own age in parallel (they can be
  // a different age to you), so retirement timing, contribution windows,
  // minimum-drawdown bands and Age Pension eligibility are each evaluated
  // against the right person's real age, not a shared counter.
  for(var age=st.startAge,tinaAge=st.tinaStartAge;age<=st.endAge;age++,tinaAge++){
    var yearOffset=age-st.startAge;
    // "Retire at age X" means X is your LAST working year (still
    // contributing, still earning work returns) — retirement/drawdown
    // proper starts the following year (age X+1). Using <= (not <) here is
    // what makes that the case; the matching yIdx/badge adjustments below
    // keep everything else lined up with this same one-row shift.
    var rWork=age<=st.robRetireAge,tWork=st.hasPartner&&tinaAge<=st.tinaRetireAge;
    // Carry-forward concessional cap: drop ledger entries older than 5
    // years, then — only while working, under the $500k TSB threshold, and
    // with the feature turned on — add whatever's left in the ledger to
    // this year's standard cap before working out the actual contribution.
    rCarryLedger=rCarryLedger.filter(function(e){return age-e.age<5;});
    tinaCarryLedger=tinaCarryLedger.filter(function(e){return tinaAge-e.age<5;});
    var ccfOn=st.ccCarryForward&&st.ccCarryForward.enabled;
    var rCarryAvail=(ccfOn&&rWork&&rBal<500000)?rCarryLedger.reduce(function(s,e){return s+e.unused;},0):0;
    var tinaCarryAvail=(ccfOn&&st.hasPartner&&tWork&&tBal<500000)?tinaCarryLedger.reduce(function(s,e){return s+e.unused;},0):0;
    var rCapBase=ccCapForAge(age,st),tinaCapBase=ccCapForAge(age,st);
    var rCC=rWork?contribForPerson(st.contribMode,st.robIncome,st.robExtraContrib,st.robContribTotal,age,st,rCarryAvail):0;
    var tCC=tWork?contribForPerson(st.contribMode,st.tinaIncome,st.tinaExtraContrib,st.tinaContribTotal,age,st,tinaCarryAvail):0;
    // Consume the ledger oldest-first if this year's contribution dipped
    // into carry-forward, then bank whatever's left unused from THIS
    // year's own standard cap for future years.
    if(rCC>rCapBase){
      var rUsed=rCC-rCapBase;
      for(var rli=0;rli<rCarryLedger.length&&rUsed>0;rli++){var rTake=Math.min(rCarryLedger[rli].unused,rUsed);rCarryLedger[rli].unused-=rTake;rUsed-=rTake;}
      rCarryLedger=rCarryLedger.filter(function(e){return e.unused>0.01;});
    }
    if(st.hasPartner&&tCC>tinaCapBase){
      var tUsed=tCC-tinaCapBase;
      for(var tli=0;tli<tinaCarryLedger.length&&tUsed>0;tli++){var tTake=Math.min(tinaCarryLedger[tli].unused,tUsed);tinaCarryLedger[tli].unused-=tTake;tUsed-=tTake;}
      tinaCarryLedger=tinaCarryLedger.filter(function(e){return e.unused>0.01;});
    }
    if(rWork)rCarryLedger.push({age:age,unused:Math.max(0,rCapBase-Math.min(rCC,rCapBase))});
    if(st.hasPartner&&tWork)tinaCarryLedger.push({age:tinaAge,unused:Math.max(0,tinaCapBase-Math.min(tCC,tinaCapBase))});
    // Division 293: extra 15% tax on concessional contributions when
    // (income + CC) exceeds the (unindexed) threshold. Applied on top of the
    // normal 15% contributions tax, so total tax on the excess is 30%.
    var rDiv293=0,tDiv293=0;
    if(st.div293&&st.div293.enabled){
      var rSurchargeIncome=(st.div293.robIncome||0)+rCC;
      rDiv293=Math.min(rCC,Math.max(0,rSurchargeIncome-st.div293.threshold))*0.15;
      var tSurchargeIncome=(st.div293.tinaIncome||0)+tCC;
      tDiv293=Math.min(tCC,Math.max(0,tSurchargeIncome-st.div293.threshold))*0.15;
    }
    // Accumulation returns. Insurance premiums (life/TPD/income protection)
    // are deducted here too, while working only — separate from admin/
    // investment fees, which are assumed already netted out of the work
    // return itself (see the note next to those sliders).
    if(rWork){var nr=rCC*(1-st.contribTax)-rDiv293-(st.robInsurancePremium||0),br=Math.max(0,rBal+nr);rBal=br+br*st.robWorkReturn;}
    if(tWork){var nt=tCC*(1-st.contribTax)-tDiv293-(st.tinaInsurancePremium||0),bt=Math.max(0,tBal+nt);tBal=bt+bt*st.tinaWorkReturn;}
    if(!st.hasPartner)tBal=0;
    // Non-concessional contributions (no tax, any phase) — window is each
    // person's own age, since "contribute from 55 to 60" naturally means
    // when THAT PERSON is 55-60, not when your age happens to be 55-60.
    var robNCC=0,tinaNCC=0;
    // Capped at the legislated (escalating) annual NCC cap - the slider
    // allows larger figures but the model never contributes above the cap.
    if(st.ncc&&st.ncc.enabled&&age>=st.ncc.startAge&&age<=st.ncc.endAge){robNCC=Math.min(st.ncc.robAnnual||0,nccCapForAge(age,st));rBal+=robNCC;}
    if(st.hasPartner&&st.ncc&&st.ncc.enabled&&tinaAge>=st.ncc.startAge&&tinaAge<=st.ncc.endAge){tinaNCC=Math.min(st.ncc.tinaAnnual||0,nccCapForAge(age,st));tBal+=tinaNCC;}
    // Single-person mode: retirement/spend phasing is driven by YOUR status
    // alone — there's no partner to factor into "has anyone retired yet"
    // or "have both retired".
    var anyRet=st.hasPartner?(!rWork||!tWork):!rWork;
    var bothRet=st.hasPartner?(!rWork&&!tWork):false;
    // Spending starts the year AFTER the retire-age row, since that row is
    // now (per rWork/tWork above) still a working/contributing year — the
    // last one. This avoids the earlier "dead year" bug (retired-but-not-
    // spending) without also starting drawdown too early: the row where
    // someone is actually marked retired is the same row spend begins.
    var yIdx=(anyRet&&yearOffset>earliestRetireOffset)?(yearOffset-earliestRetireOffset-1):-1;
    var stageI=yIdx>=0?stageIdx(yIdx,st):-1;
    var stage=stageI>=0?stageName(stageI):'';
    // Retirement returns (+ optional pension-phase tax boost).
    // Transfer Balance Cap: any balance above the (indexed) cap can't sit in
    // the tax-free pension phase — it's modelled as remaining in
    // accumulation, so its earnings are taxed at 15% instead of 0%.
    var pb=st.pensionBoost&&st.pensionBoost.enabled?st.pensionBoost.rate||0.012:0;
    var tbcCap=st.tbc&&st.tbc.enabled?tbcCapForAge(age,st):Infinity;
    if(!rWork){
      var rr=(returnOverrideFn?returnOverrideFn(age):st.retireReturn)+pb;
      if(rBal>tbcCap){robOverTBC=true;var rPension=tbcCap,rAccum=rBal-tbcCap;rBal=rBal+rPension*rr+rAccum*rr*(1-0.15);}
      else{rBal=rBal+rBal*rr;}
    }
    if(st.hasPartner&&!tWork){
      var rt=(returnOverrideFn?returnOverrideFn(age):st.retireReturn)+pb;
      if(tBal>tbcCap){tinaOverTBC=true;var tPension=tbcCap,tAccum=tBal-tbcCap;tBal=tBal+tPension*rt+tAccum*rt*(1-0.15);}
      else{tBal=tBal+tBal*rt;}
    }
    // ── Lump sums applied after returns ────────────────────────────────────
    var lsRob=0,lsTina=0,lsItems=[];
    (st.lumpSums||[]).forEach(function(ls){
      if(ls.age!==age)return;
      lsItems.push(ls);
      var sign=ls.type==='outflow'?-1:1;
      var amt=sign*Math.abs(ls.amount);
      // Single-person mode: there's no partner to receive/pay a "tina" or
      // "both" event, so it all lands on you instead of silently vanishing.
      // 'To Super' events are capped at contribution limits: downsizer at
      // $300k per person ($600k for 'both'); other in-payments at the 3-yr
      // NCC bring-forward maximum (3x the annual cap per person).
      if(ls.type==='super'){
        var perPersonCap=ls.downsizer?300000:nccCapForAge(age,st)*3;
        var effCap=(st.hasPartner&&ls.who==='both')?perPersonCap*2:perPersonCap;
        amt=sign*Math.min(Math.abs(amt),effCap);
      }
      var effWho=st.hasPartner?ls.who:'rob';
      if(effWho==='rob'){lsRob+=amt;}
      else if(effWho==='tina'){lsTina+=amt;}

    });

    tBal=st.hasPartner?Math.max(0,tBal+lsTina):0;
    // ── Other income ────────────────────────────────────────────────────────
    // Income from the Other Assets (real estate/shares/other) buckets is
    // off entirely during accumulation — it switches on once someone has
    // actually retired (anyRet), X years after that first retirement, per
    // otherIncomeStartOffset (0 = starts the same year retirement begins,
    // matching the row the "retires" badge appears on). This replaces the
    // old fixed-age trigger, which ran on a hardcoded age regardless of
    // when retirement actually happened.
    var otherIncome=0;
    var retireStartOffset=earliestRetireOffset+1;
    var oiTriggerOffset=retireStartOffset+(st.otherIncomeStartOffset||0);
    if(anyRet&&yearOffset>=oiTriggerOffset){
      otherIncome=totalOther*st.otherAssetsReturn*Math.pow(1+st.otherAssetsCpi,yearOffset-oiTriggerOffset);
    }
    // ── Age pension ─────────────────────────────────────────────────────────
    // Pension thresholds/rates are indexed forward from today (calendar
    // year, via `age`/robAge) so a 40-year projection doesn't apply 2026
    // settings unchanged decades out. Eligibility is assessed per person at
    // age 67. If only one member of a couple is eligible, the household gets
    // the member-of-a-couple rate (half the combined couple rate); a still-
    // working younger partner's accumulation super is exempt from the means
    // test until they reach pension age (once retired it's modelled as
    // moved to pension phase and therefore counted).
    // Part-time income is computed here (moved up from below) so it can be
    // included in the pension income test, per person, with the $300/fn
    // ($7,800/yr) Work Bonus each deducted first.
    var rPT=0,tPT=0;
    if(st.partTime&&st.partTime.enabled){
      if(age>st.robRetireAge&&age<=st.partTime.robEndAge)rPT=st.partTime.robAmount||0;
      if(st.hasPartner&&tinaAge>st.tinaRetireAge&&tinaAge<=st.partTime.tinaEndAge)tPT=st.partTime.tinaAmount||0;
    }
    var pension=0;
    var robPenAge=age>=67,tinaPenAge=st.hasPartner&&tinaAge>=67;
    if(st.usePension&&anyRet&&(robPenAge||tinaPenAge)){
      var robSuperCounted=robPenAge||!rWork;
      var tinaSuperCounted=st.hasPartner&&(tinaPenAge||!tWork);
      var countedSuper=(robSuperCounted?rBal:0)+(tinaSuperCounted?tBal:0);
      var reAssets=(st.otherAssetsBuckets&&st.otherAssetsBuckets.realestate)||0;
      var finAssets=countedSuper+Math.max(0,totalOther-reAssets)+excessMDBal;
      var reIncome=totalOther>0?otherIncome*(reAssets/totalOther):0;
      var assessedInc=reIncome+Math.max(0,rPT-7800)+Math.max(0,tPT-7800);
      pension=estimateAgePension({
        totalAssets:finAssets+reAssets,financialAssets:finAssets,homeowner:st.homeowner,
        assessedIncome:assessedInc,
        fullPension:idx(st.fullPension,age,st),assetThreshold:idx(st.assetThreshold,age,st),
        assetTaperPerDollar:st.assetTaperPerDollar,deemingThreshold:idx(st.deemingThreshold,age,st),
        deemingRateLow:st.deemingRateLow,deemingRateHigh:st.deemingRateHigh,
        incomeFreeArea:idx(st.incomeFreeArea,age,st),incomeTaperRate:st.incomeTaperRate
      });
      if(st.hasPartner&&!(robPenAge&&tinaPenAge))pension*=0.5;
    }
    // ── Part-time / phased retirement income ────────────────────────────────
    // Each person's own window, against their own age.
    // (computed above, before the Age Pension block, so it feeds the
    // income test; rPT/tPT are the per-person amounts)
    var ptIncome=rPT+tPT;
    // ── Spend ────────────────────────────────────────────────────────────────
    // Golden/Silver/Legacy sliders are treated as today's dollars and grown
    // to nominal terms at the CPI rate (consistent with the pension/cap
    // indexation above), so the "Real $" display toggle reverses a matching
    // escalation rather than un-inflating a figure that never grew.
    var baseSpend=stageI===0?st.spendGolden:stageI===1?st.spendSilver:stageI===2?st.spendLegacy:0;
    var grossSpend=baseSpend>0?idx(baseSpend,age,st):0;
    var netSpend=Math.max(0,grossSpend-pension-otherIncome-ptIncome);
    var rSpend=0,tSpend=0;
    if(netSpend>0){
      if(bothRet){
        var tR=netSpend*(st.splitPct/100),tT=netSpend-tR;
        rSpend=Math.min(rBal,tR);tSpend=Math.min(tBal,tT);
        var rem=netSpend-(rSpend+tSpend);
        if(rem>0){var rE=Math.min(Math.max(0,rBal-rSpend),rem);rSpend+=rE;rem-=rE;tSpend+=Math.min(Math.max(0,tBal-tSpend),rem);}
      }else if(!rWork){rSpend=Math.min(rBal,netSpend);}
      else{tSpend=Math.min(tBal,netSpend);}
    }
    // ── Minimum drawdown enforcement (ATO) ──────────────────────────────────
    // Each person's mandatory % is set by their OWN age band (4% at 60-64,
    // 5% at 65-74, etc.) — not a shared age, since the bands are genuinely
    // age-based law that applies per individual.
    var rSpendBeforeMD=rSpend,tSpendBeforeMD=tSpend;
    // How much of the desired netSpend could actually be funded from super
    // BEFORE any mandatory-minimum-drawdown top-up below — that top-up (if
    // any) isn't lifestyle spend, it's excess cash forced out and reinvested
    // (tracked separately as excessMDCash), so it shouldn't count toward
    // "what could actually be spent".
    // Total real income this year - pension, other-asset income and part-
    // time income are genuine income streams that exist regardless of what
    // the target spend happens to be, plus whatever was actually drawn
    // from super to help meet that target (before any mandatory-minimum-
    // drawdown top-up, which is forced-out capital rather than lifestyle
    // spend and is tracked separately via excessMDCash below). This is
    // mathematically identical to the old shortfall-only calc whenever
    // income is below target, but - unlike the old formula, which quietly
    // capped the displayed figure at the target - it's also allowed to
    // come out ABOVE target, which is exactly what shows up as a surplus
    // (pension + other income alone already covering, or more than
    // covering, that year's target) rather than disappearing unseen.
    var totalAvailable=pension+otherIncome+ptIncome+rSpendBeforeMD+tSpendBeforeMD;
    var spendShortfall=Math.max(0,grossSpend-totalAvailable);
    var spendSurplus=Math.max(0,totalAvailable-grossSpend);
    var availableSpend=totalAvailable;
    if(st.minDrawdown&&st.minDrawdown.enabled){
      if(!rWork&&age>=(st.minDrawdown.startAge||61)){var robMD=rBal*minDrawdownRate(age);if(robMD>rSpend)rSpend=Math.min(rBal,robMD);}
      if(st.hasPartner&&!tWork&&tinaAge>=(st.minDrawdown.startAge||61)){var tinaMD=tBal*minDrawdownRate(tinaAge);if(tinaMD>tSpend)tSpend=Math.min(tBal,tinaMD);}
    }
    rBal=Math.max(0,rBal-rSpend);
    tBal=Math.max(0,tBal-tSpend);
    // Cash pushed out of super by the mandatory minimum beyond what desired
    // spend needed — grown at the same rate as the retirement portfolio
    // (simplification: assumes it's reinvested, not spent).
    var excessMDThisYear=Math.max(0,rSpend-rSpendBeforeMD)+Math.max(0,tSpend-tSpendBeforeMD);
    var mdGrowthRate=returnOverrideFn?returnOverrideFn(age):st.retireReturn;
    excessMDBal=excessMDBal*(1+mdGrowthRate)+excessMDThisYear;
    rows.push({age,tinaAge,phase:'FORECAST',stage,
      robClose:rBal,tinaClose:tBal,combinedClose:rBal+tBal,
      grossSpend,availableSpend,spendShortfall,spendSurplus,otherIncome,pension,ptIncome,robSpend:rSpend,tinaSpend:tSpend,
      excessMDCash:excessMDBal,

      // rWork/yIdx above — that's the row where contributions have actually
      // stopped and drawdown begins, not the last working year the slider
      // number itself refers to. If a retirement age is set below the

      combinedClose:(st.robSeed||0)+(st.hasPartner?(st.tinaSeed||0):0),
      grossSpend:0,availableSpend:0,spendShortfall:0,otherIncome:0,pension:0,ptIncome:0,
      robSpend:0,tinaSpend:0,excessMDCash:0,robCC:0,tinaCC:0,robNCC:0,tinaNCC:0,rDiv293:0,tDiv293:0,

function buildTimelineB(){

function buildShockTimeline(){
  if(!state.shock.enabled)return null;
  var shockStartOffset=earliestRetireYearOffset(state)+(state.shock.startOffset-1);
  var shockEndOffset=shockStartOffset+state.shock.durationYears-1;
  var shockRet=state.shock.type==='crash'?-(state.shock.magnitude/100):(state.shock.magnitude/100);
  return buildTimeline(state,function(age){
    var yearOffset=age-state.startAge;
    if(yearOffset>=shockStartOffset&&yearOffset<=shockEndOffset)return shockRet;
    return state.retireReturn;

// ─── Monte Carlo ──────────────────────────────────────────────────────────
function buildMonteCarloRows(){
  if(!state.monteCarlo||!state.monteCarlo.enabled)return null;
  var runs=Math.min(state.monteCarlo.runs||300,500);
  var sigma=(state.monteCarlo.stdDev||10)/100;
  var erRobAge=state.startAge+earliestRetireYearOffset(state);
  var seed=54321;
  function rng(){seed=((seed*1664525+1013904223)>>>0);return seed/4294967296;}
  function randn(){var u=Math.max(1e-9,rng()),v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(6.2831853*v);}
  var ages=[];var sa=state.startAge;
  for(var a=sa;a<=state.endAge;a++)ages.push(a);
  var byAge={};ages.forEach(function(a){byAge[a]=[];});
  for(var i=0;i<runs;i++){
    var rm={};
    for(var a=state.startAge;a<=state.endAge;a++){
      var mean=a<erRobAge?state.robWorkReturn:state.retireReturn;
      rm[a]=Math.max(-0.5,Math.min(0.6,mean+sigma*randn()));
    }
    var ovFn=function(age){return rm[age]!==undefined?rm[age]:state.retireReturn;};
    buildTimeline(state,ovFn).forEach(function(r){if(byAge[r.age])byAge[r.age].push(r.combinedClose);});
  }
  function pct(arr,p){var s=arr.slice().sort(function(a,b){return a-b;});return s[Math.min(Math.floor(p*s.length),s.length-1)]||0;}
  return ages.map(function(a){var v=byAge[a]||[];return{age:a,p10:pct(v,.1),p25:pct(v,.25),p50:pct(v,.5),p75:pct(v,.75),p90:pct(v,.9)};});
}
// Monte Carlo (up to 500 runs × the full projection horizon each) is heavy
// enough that recomputing it on every single slider `input` event — which
// fires continuously while dragging, not just on release — caused visible
// jank. Cache the last result keyed off a full state snapshot; while a value
// is "in flight" for a new state, keep serving the last-good result and
// debounce the real recompute to 120ms after input settles, then trigger one
// more render so the chart catches up. First-ever call computes synchronously
// so the initial page load isn't stuck showing nothing.
var mcCache={sig:null,rows:null},mcTimer=null;
function getMonteCarloRowsDebounced(){
  if(!state.monteCarlo||!state.monteCarlo.enabled){mcCache.sig=null;mcCache.rows=null;if(mcTimer){clearTimeout(mcTimer);mcTimer=null;}return null;}
  var sig=JSON.stringify(state);
  if(mcCache.sig===sig)return mcCache.rows;
  if(mcCache.rows===null){mcCache.sig=sig;mcCache.rows=buildMonteCarloRows();return mcCache.rows;}
  if(mcTimer)clearTimeout(mcTimer);
  mcTimer=setTimeout(function(){mcCache.sig=sig;mcCache.rows=buildMonteCarloRows();mcTimer=null;render();},120);
  return mcCache.rows;
}

// ─── Goal solver (binary search) ──────────────────────────────────────────
function solveMaxSpend(targetBalance){
  var lo=0,hi=2000000;
  for(var i=0;i<60;i++){
    var mid=(lo+hi)/2;
    var ratio=mid/Math.max(1,state.spendGolden);
    var st2=Object.assign({},state,{spendGolden:mid,spendSilver:state.spendSilver*ratio,spendLegacy:state.spendLegacy*ratio});
    var fRows=buildTimeline(st2).filter(function(r){return r.phase==='FORECAST';});
    var last=fRows[fRows.length-1];
    // Bug fix: checking only the final row's balance isn't enough. Once a
    // balance hits 0 it stays floored there (see buildDrawdown/buildTimeline),
    // so a spend level that exhausts funds at, say, age 70 looks identical —
    // at age 90 — to a spend level that lasts exactly to age 90 with nothing
    // left. Both satisfied "final balance >= targetBalance" whenever
    // targetBalance was 0, which let the binary search climb all the way to
    // its $2,000,000 upper bound and report that as "sustainable." Now we
    // also require that funds were never exhausted before the final
    // projection year.
    var exhaustedEarly=fRows.some(function(r,idx){return idx<fRows.length-1&&r.combinedClose<=0;});
    var ok=!exhaustedEarly&&last&&last.combinedClose>=targetBalance;
    if(ok)lo=mid;else hi=mid;
  }
  return Math.round(lo/1000)*1000;
}
// Same debounce treatment as Monte Carlo: 60 binary-search iterations, each a
// full buildTimeline(), on every slider input event was the other source of
// drag jank. Cache + debounce, computing synchronously on first call only.
var goalCache={sig:null,val:null},goalTimer=null;
function getMaxSpendDebounced(targetBalance){
  var sig=JSON.stringify(state)+'|'+targetBalance;
  if(goalCache.sig===sig)return goalCache.val;
  if(goalCache.val===null){goalCache.sig=sig;goalCache.val=solveMaxSpend(targetBalance);return goalCache.val;}
  if(goalTimer)clearTimeout(goalTimer);
  goalTimer=setTimeout(function(){goalCache.sig=sig;goalCache.val=solveMaxSpend(targetBalance);goalTimer=null;render();},120);
  return goalCache.val;
}

// ─── Sensitivity grid ─────────────────────────────────────────────────────
function buildSensitivity(){
  var rDeltas=[-0.02,-0.01,0,0.01,0.02];
  var axis=state.sensitivityAxis||'spend';
  // Row axis: either spend deltas (original behaviour) or a shared shift to
  // both retirement ages (years earlier/later), clamped to the sliders'
  // 55–70 range. Column axis is always retirement-return delta either way.
  var sDeltas=axis==='retireAge'?[-4,-2,0,2,4]:[-50000,-25000,0,25000,50000];
  return{
    axis:axis,rDeltas:rDeltas,sDeltas:sDeltas,
    grid:sDeltas.map(function(sd){
      return rDeltas.map(function(rd){
        var overrides={retireReturn:Math.max(0,state.retireReturn+rd)};
        if(axis==='retireAge'){
          overrides.robRetireAge=Math.max(55,Math.min(70,state.robRetireAge+sd));
          overrides.tinaRetireAge=Math.max(55,Math.min(70,state.tinaRetireAge+sd));
        }else{
          overrides.spendGolden=Math.max(0,state.spendGolden+sd);
          overrides.spendSilver=Math.max(0,state.spendSilver+sd);
          overrides.spendLegacy=Math.max(0,state.spendLegacy+sd);
        }
        var st2=Object.assign({},state,overrides);
        var rows=buildTimeline(st2).filter(function(r){return r.phase==='FORECAST';});
        return rows.length?rows[rows.length-1].combinedClose:0;
      });
    })
  };
}

// ─── Net worth rows ────────────────────────────────────────────────────────
function netWorthRows(rows){
  var er=state.startAge+earliestRetireYearOffset(state);
  var hv=state.netWorth?state.netWorth.homeValue:0;
  var hc=state.netWorth?state.netWorth.homeCpi:0.04;
  var oa=otherTotal();
  return rows.filter(function(r){return r.phase==='FORECAST';}).map(function(r){
    var homeEq=state.homeowner&&hv>0?hv*Math.pow(1+hc,r.age-er):0;
    var excessMD=r.excessMDCash||0;
    return{age:r.age,superBal:r.combinedClose,home:homeEq,other:oa,excessMD:excessMD,total:r.combinedClose+homeEq+oa+excessMD};
  });
}

function sld(label,min,max,step,val,disp,fn){
  // Typing a value straight in is a lot faster/more precise than dragging
  // for anyone who already knows the number they want. Commits on blur or
  // Enter (not on every keystroke, so partial input like "2" while typing
  // "20" doesn't jump the slider mid-type), clamped to the same min/max the
  // slider itself uses, and calls the exact same fn() the slider does - so
  // typing and dragging always stay in sync.
  function commit(e){
    var v=numOr(e.target.value,min);
    v=Math.min(max,Math.max(min,v));
    fn(v);
  }
  // Round only for display in the typed box - avoids exposing JS floating-
  // point noise (e.g. 0.07*100 -> 7.000000000000001) to the user; the
  // underlying state value itself is untouched.
  var displayVal=Math.round(val*10000)/10000;
  var numBox=el('input',{type:'number',value:String(displayVal),step:String(step),min:String(min),max:String(max),
    'aria-label':label+', type an exact value',
    style:{width:'64px',fontSize:'12px',fontFamily:'monospace',color:'#6c8ef0',background:'#181b28',
      border:'1px solid #2a3050',borderRadius:'6px',padding:'2px 5px',textAlign:'right'},
    onBlur:commit,
    onKeydown:function(e){if(e.key==='Enter'){e.preventDefault();commit(e);e.target.blur();}}});
  return el('div',{style:{margin:'8px 0'}},[
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px',gap:'8px'}},[
      el('div',{style:{fontSize:'12px',color:'#c0c5d8',fontWeight:'700'}},label),
      el('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},[
        el('div',{style:{fontSize:'12px',color:'#6c8ef0',fontFamily:'monospace'}},disp),
        numBox

    el('input',{type:'range',min:String(min),max:String(max),step:String(step),value:String(val),
      'aria-label':label+', currently '+disp,
      style:{width:'100%'},onInput:function(e){fn(numOr(e.target.value,min));}})
  ]);
}
function numI(label,val,fn,opts){
  opts=opts||{};
  var attrs={type:'number',value:String(val),step:String(opts.step||1),
    min:String(opts.min||0),'aria-label':label,style:{width:'100%'}};
  if(opts.max!=null)attrs.max=String(opts.max);

  // Guard against NaN from empty/invalid input (e.g. user clears the field
  // or types a non-numeric value) silently propagating into the model, and
  // clamp to the field's declared min/max — the HTML min/max attributes
  // only affect the spinner arrows and validity styling, not what's
  // actually accepted on change, so a typed/pasted negative number or an
  // out-of-range value would otherwise pass straight into the model.

    var v=numOr(e.target.value,opts.min||0);
    if(opts.min!=null)v=Math.max(opts.min,v);
    if(opts.max!=null)v=Math.min(opts.max,v);
    inp.value=String(v);
    fn(v);
  });

    el('div',{style:{fontSize:'12px',color:'#c0c5d8',fontWeight:'700',marginBottom:'2px'}},label),
    inp]);

// ─── Income sources stacked area chart ────────────────────────────────────
function incomeStackChart(rows){
  var fRows=rows.filter(function(r){return r.phase==='FORECAST'&&r.grossSpend>0;});
  if(!fRows.length)return null;
  var W=980,H=260,pL=72,pR=22,pT=20,pB=42;
  var xMin=fRows[0].age,xMax=fRows[fRows.length-1].age;
  var yMax=Math.max.apply(null,fRows.map(function(r){return r.grossSpend;}))*1.1;
  var xD=(xMax-xMin)||1,yD=yMax||1;
  function xp(a){return pL+((a-xMin)/xD)*(W-pL-pR);}
  function yp(v){return pT+(1-(v/yD))*(H-pT-pB);}
  var svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H,style:'width:100%;height:auto;display:block'});
  svg.appendChild(svgEl('rect',{x:'0',y:'0',width:String(W),height:String(H),fill:'#0f1117'}));
  // Grid lines
  for(var gi=0;gi<=4;gi++){var gv=yMax*gi/4,gy=yp(gv);
    svg.appendChild(svgEl('line',{x1:String(pL),y1:String(gy),x2:String(W-pR),y2:String(gy),stroke:'rgba(255,255,255,.05)'}));
    svg.appendChild(svgEl('text',{x:String(pL-6),y:String(gy+4),fill:'#5a6080','text-anchor':'end',style:'font-size:9px;font-family:monospace'},'$'+Math.round(gv/1000)+'k'));
  }
  var step=Math.max(1,Math.ceil((xMax-xMin)/8));
  for(var xa=xMin;xa<=xMax;xa+=step)svg.appendChild(svgEl('text',{x:String(xp(xa)),y:String(H-pB+16),fill:'#5a6080','text-anchor':'middle',style:'font-size:9px'},String(yearForAge(xa))));
  svg.appendChild(svgEl('line',{x1:String(pL),y1:String(H-pB),x2:String(W-pR),y2:String(H-pB),stroke:'rgba(255,255,255,.1)'}));
  // Draw stacked areas: pension → other → partTime → super drawdown
  var layers=[
    {key:'pension',col:'rgba(240,185,108,0.75)',lbl:'Age Pension'},
    {key:'otherIncome',col:'rgba(160,108,240,0.6)',lbl:'Other Income'},
    {key:'ptIncome',col:'rgba(93,216,122,0.6)',lbl:'Part-time'},
    {key:'superDraw',col:'rgba(108,142,240,0.55)',lbl:'Super Drawdown'}
  ];
  function stackedPts(bottom,top,rev){
    var pts=bottom.map(function(b,i){return xp(fRows[i].age).toFixed(1)+','+yp(b).toFixed(1);});
    var topPts=top.map(function(t,i){return xp(fRows[i].age).toFixed(1)+','+yp(t).toFixed(1);});
    if(rev)topPts=topPts.slice().reverse();
    return pts.join(' ')+' '+topPts.join(' ');
  }
  var bottoms=fRows.map(function(){return 0;});
  var drawnLayers=[];
  layers.forEach(function(ly){
    var vals=fRows.map(function(r){
      if(ly.key==='superDraw')return(r.robSpend||0)+(r.tinaSpend||0);
      return r[ly.key]||0;
    });
    var topped=vals.map(function(v,i){return bottoms[i]+v;});
    if(topped.some(function(v){return v>0;})){
      var fwdPts=topped.map(function(t,i){return xp(fRows[i].age).toFixed(1)+','+yp(t).toFixed(1);});
      var bwdPts=bottoms.map(function(b,i){return xp(fRows[i].age).toFixed(1)+','+yp(b).toFixed(1);}).slice().reverse();
      svg.appendChild(svgEl('polygon',{points:fwdPts.join(' ')+' '+bwdPts.join(' '),fill:ly.col,stroke:'none'}));
      svg.appendChild(svgEl('path',{d:fwdPts.map(function(p,i){return(i?'L ':'M ')+p;}).join(' '),fill:'none',stroke:ly.col.replace(/[\d.]+\)$/,'1)'),'stroke-width':'1'}));
      drawnLayers.push(ly);
    }
    bottoms=topped;
  });
  // Gross spend cap line
  var spendLine=fRows.map(function(r,i){return(i?'L ':'M ')+xp(r.age).toFixed(1)+' '+yp(r.grossSpend).toFixed(1);}).join(' ');
  svg.appendChild(svgEl('path',{d:spendLine,fill:'none',stroke:'rgba(255,255,255,0.18)','stroke-width':'1','stroke-dasharray':'4,3'}));
  // Legend
  drawnLayers.forEach(function(ly,j){var lx=pL+j*130,ly2=H-4;
    svg.appendChild(svgEl('rect',{x:String(lx),y:String(ly2-9),width:'10',height:'10',fill:ly.col}));
    svg.appendChild(svgEl('text',{x:String(lx+14),y:String(ly2),fill:'#c0c5d8',style:'font-size:10px'},ly.lbl));
  });
  return svg;
}

function netWorthChart(nwRows){
  if(!nwRows||!nwRows.length)return null;
  var W=980,H=260,pL=72,pR=22,pT=20,pB=42;
  var xMin=nwRows[0].age,xMax=nwRows[nwRows.length-1].age;
  var yMax=Math.max.apply(null,nwRows.map(function(r){return r.total;}))*1.08||1;
  var xD=(xMax-xMin)||1;
  function xp(a){return pL+((a-xMin)/xD)*(W-pL-pR);}
  function yp(v){return pT+(1-(v/(yMax||1)))*(H-pT-pB);}
  function mkPath(key){return nwRows.map(function(r,i){return(i?'L ':'M ')+xp(r.age).toFixed(1)+' '+yp(r[key]).toFixed(1);}).join(' ');}
  var svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H,style:'width:100%;height:auto;display:block'});
  svg.appendChild(svgEl('rect',{x:'0',y:'0',width:String(W),height:String(H),fill:'#0f1117'}));
  for(var gi=0;gi<=4;gi++){var gv=yMax*gi/4,gy=yp(gv);
    svg.appendChild(svgEl('line',{x1:String(pL),y1:String(gy),x2:String(W-pR),y2:String(gy),stroke:'rgba(255,255,255,.05)'}));
    svg.appendChild(svgEl('text',{x:String(pL-6),y:String(gy+4),fill:'#5a6080','text-anchor':'end',style:'font-size:9px;font-family:monospace'},'$'+Math.round(gv/1000)+'k'));
  }
  var step=Math.max(1,Math.ceil((xMax-xMin)/8));
  for(var xa=xMin;xa<=xMax;xa+=step)svg.appendChild(svgEl('text',{x:String(xp(xa)),y:String(H-pB+16),fill:'#5a6080','text-anchor':'middle',style:'font-size:9px'},String(yearForAge(xa))));
  svg.appendChild(svgEl('line',{x1:String(pL),y1:String(H-pB),x2:String(W-pR),y2:String(H-pB),stroke:'rgba(255,255,255,.1)'}));
  // Stacked area: super, home, other, excess mandatory drawdown (reinvested)
  var layers2=[
    {key:'superBal',col:'rgba(108,142,240,0.55)',lbl:'Super'},
    {key:'home',col:'rgba(93,216,122,0.45)',lbl:'Home Equity'},
    {key:'other',col:'rgba(240,185,108,0.45)',lbl:'Other Assets'},
    {key:'excessMD',col:'rgba(160,108,240,0.45)',lbl:'Excess Min. Drawdown'}
  ];
  var bot=nwRows.map(function(){return 0;});
  layers2.forEach(function(ly){
    var vals=nwRows.map(function(r){return r[ly.key]||0;});
    var top=vals.map(function(v,i){return bot[i]+v;});
    if(top.some(function(v){return v>0;})){
      var fpts=top.map(function(t,i){return xp(nwRows[i].age).toFixed(1)+','+yp(t).toFixed(1);});
      var bpts=bot.map(function(b,i){return xp(nwRows[i].age).toFixed(1)+','+yp(b).toFixed(1);}).slice().reverse();
      svg.appendChild(svgEl('polygon',{points:fpts.join(' ')+' '+bpts.join(' '),fill:ly.col}));
      svg.appendChild(svgEl('path',{d:fpts.map(function(p,i){return(i?'L ':'M ')+p;}).join(' '),fill:'none',stroke:ly.col.replace(/[\d.]+\)$/,'1)'),'stroke-width':'1.5'}));
    }
    bot=top;
  });
  svg.appendChild(svgEl('path',{d:mkPath('total'),fill:'none',stroke:'#e8eaf0','stroke-width':'2'}));
  var legNW=[{l:'Super',c:'rgba(108,142,240,0.7)'},{l:'Home',c:'rgba(93,216,122,0.7)'},{l:'Other',c:'rgba(240,185,108,0.7)'},{l:'Excess Min. Drawdown',c:'rgba(160,108,240,0.7)'},{l:'Total',c:'#e8eaf0'}];
  legNW.forEach(function(it,j){var lx=pL+j*120,ly=H-4;
    svg.appendChild(svgEl('rect',{x:String(lx),y:String(ly-9),width:'10',height:'10',fill:it.c}));
    svg.appendChild(svgEl('text',{x:String(lx+14),y:String(ly),fill:'#c0c5d8',style:'font-size:10px'},it.l));
  });
  return svg;
}

// ─── Sensitivity table ─────────────────────────────────────────────────────
function sensitivityTable(){
  var data=buildSensitivity();
  var axis=data.axis;
  var baseVal=data.grid[2][2]; // centre cell
  var wrap=el('div',{});
  wrap.appendChild(el('div',{style:{display:'flex',gap:'5px',marginBottom:'8px'}},[
    segBtn('Spend',axis==='spend',function(){state.sensitivityAxis='spend';render();}),
    segBtn('Retirement Age',axis==='retireAge',function(){state.sensitivityAxis='retireAge';render();})
  ]));
  var tblWrap=el('div',{style:{overflowX:'auto'}});
  var tbl=el('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'11px',fontFamily:'monospace'}});
  // Header row (return deltas)
  var hRow=el('tr',{});
  hRow.appendChild(el('th',{style:{padding:'5px 8px',color:'#5a6080',textAlign:'right',fontSize:'10px'}},(axis==='retireAge'?'Retire↓':'Spend↓')+' / Ret→'));
  data.rDeltas.forEach(function(rd){
    var lbl=(rd>0?'+':'')+Math.round(rd*100)+'%';
    hRow.appendChild(el('th',{style:{padding:'5px 8px',color:'#7a8099',textAlign:'center',fontSize:'10px',fontWeight:'900'}},lbl));
  });
  tbl.appendChild(el('thead',{},[hRow]));
  var tbody=el('tbody',{});
  data.sDeltas.forEach(function(sd,si){
    var sLbl;
    if(axis==='retireAge'){
      sLbl=sd===0?'Base ('+state.robRetireAge+(state.hasPartner?'/'+state.tinaRetireAge:'')+')':(sd>0?'+':'')+sd+' yr'+(Math.abs(sd)===1?'':'s');
    }else{
      sLbl=sd===0?'Base ('+fmt(state.spendGolden)+')':(sd>0?'+':'')+fmt(sd);
    }
    var row=el('tr',{});
    row.appendChild(el('td',{style:{padding:'5px 8px',color:'#7a8099',textAlign:'right',fontSize:'10px',whiteSpace:'nowrap'}},sLbl));
    data.grid[si].forEach(function(val,ri){
      var isBase=si===2&&ri===2;
      var pct=(val-baseVal)/(Math.abs(baseVal)||1);
      var g=Math.max(0,Math.min(1,val>0?pct+0.5:0));
      var r=Math.max(0,Math.min(1,val<=0?1:1-pct-0.5));
      var bg=val>0?'rgba(93,216,122,'+(0.08+g*0.25)+')':'rgba(240,108,108,'+(0.15+r*0.3)+')';
      row.appendChild(el('td',{style:{padding:'5px 8px',textAlign:'center',background:isBase?'rgba(108,142,240,0.2)':bg,
        color:val>0?'#5dd87a':'#f06c6c',fontWeight:isBase?'900':'700',border:isBase?'1px solid rgba(108,142,240,0.5)':'none'}},
        val>0?'$'+Math.round(val/1000)+'k':val<=0?'Exhausted':'—'));
    });
    tbody.appendChild(row);
  });
  tbl.appendChild(tbody);
  tblWrap.appendChild(tbl);
  wrap.appendChild(tblWrap);
  var noteTxt=axis==='retireAge'
    ?'Values = combined super balance at age '+state.endAge+'. Blue = base scenario. Row shifts both retirement ages together (clamped 55–70); return delta applied to retirement return only.'
    :'Values = combined super balance at age '+state.endAge+'. Blue = base scenario. Return delta applied to retirement return only.';
  var note=el('div',{style:{fontSize:'10px',color:'#5a6080',marginTop:'5px'}},noteTxt);
  wrap.appendChild(note);
  return wrap;
}

// ─── Lump sum editor ───────────────────────────────────────────────────────
function lumpSumEditor(){
  var wrap=el('div',{});

  // Event form (show/hide)
  var formDiv=el('div',{style:{background:'#0a0c12',border:'1px solid #2a3050',borderRadius:'8px',padding:'10px',marginBottom:'8px',display:lsFormOpen?'':'none'}});

  var labelInp=el('input',{type:'text',placeholder:'Label (e.g. Inheritance, Downsize)',value:lsForm.label,style:{width:'100%',marginBottom:'6px'}});
  labelInp.addEventListener('input',function(e){lsForm.label=e.target.value;});
  formDiv.appendChild(labelInp);

  var row1=el('div',{style:{display:'flex',gap:'6px',marginBottom:'6px'}});
  var ageInp=el('input',{type:'number',placeholder:'Age',value:String(lsForm.age),min:String(state.startAge),max:'100',step:'1',style:{width:'60px'}});
  ageInp.addEventListener('change',function(e){lsForm.age=numOr(e.target.value,60);ageInp.value=String(lsForm.age);});
  var amtInp=el('input',{type:'number',placeholder:'Amount $',value:String(lsForm.amount),min:'0',step:'10000',style:{flex:'1'}});
  amtInp.addEventListener('change',function(e){lsForm.amount=numOr(e.target.value,0);amtInp.value=String(lsForm.amount);});
  row1.appendChild(el('div',{style:{display:'flex',flexDirection:'column',gap:'2px'}},[
    el('div',{style:{fontSize:'10px',color:'#5a6080'}},'Age'),ageInp]));
  row1.appendChild(el('div',{style:{display:'flex',flexDirection:'column',gap:'2px',flex:'1'}},[
    el('div',{style:{fontSize:'10px',color:'#5a6080'}},'Amount ($)'),amtInp]));
  formDiv.appendChild(row1);

  // Who — only relevant with a partner; single-person mode always uses you.
  if(!state.hasPartner)lsForm.who='rob';
  var whoRow=el('div',{style:{display:'flex',gap:'4px',marginBottom:'6px'}});
  function refreshWho(){
    whoRow.querySelectorAll('button').forEach(function(b){
      var active=lsForm.who===b.getAttribute('data-who');
      b.style.background=active?'rgba(108,142,240,.18)':'transparent';
      b.style.color=active?'#6c8ef0':'#7a8099';
    });
  }
  if(state.hasPartner){
    formDiv.appendChild(el('div',{style:{fontSize:'10px',color:'#5a6080',marginBottom:'3px'}},'Who receives/pays'));
    [{k:'rob',l:nameYou()},{k:'tina',l:namePartner()},{k:'both',l:'Both'}].forEach(function(o){
      var b=segBtn(o.l,lsForm.who===o.k,function(){lsForm.who=o.k;refreshWho();});
      b.setAttribute('data-who',o.k);
      whoRow.appendChild(b);
    });
    formDiv.appendChild(whoRow);
  }

  // Type
  formDiv.appendChild(el('div',{style:{fontSize:'10px',color:'#5a6080',marginBottom:'3px'}},'Type'));
  var typeRow=el('div',{style:{display:'flex',gap:'4px',marginBottom:'6px'}});
  [{k:'inflow',l:'Inflow'},{k:'outflow',l:'Outflow'},{k:'super',l:'To Super'}].forEach(function(t){
    var b=segBtn(t.l,lsForm.type===t.k,function(){lsForm.type=t.k;refreshType();downsizeRow.style.display=t.k==='super'?'':'none';});
    b.setAttribute('data-type',t.k);
    typeRow.appendChild(b);
  });
  formDiv.appendChild(typeRow);

  function refreshType(){
    typeRow.querySelectorAll('button').forEach(function(b){
      var active=lsForm.type===b.getAttribute('data-type');
      b.style.background=active?'rgba(108,142,240,.18)':'transparent';
      b.style.color=active?'#6c8ef0':'#7a8099';
    });
  }

  // Downsizer (only for super type)
  var dsChk=el('input',{type:'checkbox'});
  dsChk.checked=lsForm.downsizer;
  dsChk.addEventListener('change',function(){lsForm.downsizer=dsChk.checked;});
  var downsizeRow=el('div',{style:{display:lsForm.type==='super'?'flex':'none',alignItems:'center',gap:'6px',marginBottom:'6px',fontSize:'11px',color:'#a06cf0'}});
  downsizeRow.appendChild(dsChk);
  downsizeRow.appendChild(document.createTextNode('Downsizer contribution (non-concessional, age 55+)'));
  formDiv.appendChild(downsizeRow);

  // Buttons
  var btnRow=el('div',{style:{display:'flex',gap:'6px'}});
  var addBtn=el('button',{style:{flex:'1',padding:'6px',borderRadius:'7px',border:'none',
    background:'#6c8ef0',color:'#fff',cursor:'pointer',fontWeight:'900',fontSize:'12px'},
    onClick:function(){
      var lbl=(lsForm.label||'').trim();
      if(!lbl){labelInp.focus();return;}
      if(!lsForm.amount){amtInp.focus();return;}
      state.lumpSums.push({
        id:'ls_'+Date.now(),
        label:lbl,age:lsForm.age,amount:lsForm.amount,
        who:lsForm.who,type:lsForm.type,downsizer:lsForm.downsizer
      });
      state.lumpSums.sort(function(a,b){return a.age-b.age;});
      lsForm.label='';lsForm.amount=100000;
      lsFormOpen=false;
      render();
    }},'+ Add Event');
  var cancelBtn=el('button',{style:{padding:'6px 10px',borderRadius:'7px',border:'1px solid #252a3a',
    background:'none',color:'#7a8099',cursor:'pointer',fontSize:'12px'},
    onClick:function(){lsFormOpen=false;render();}},'Cancel');
  btnRow.appendChild(addBtn);btnRow.appendChild(cancelBtn);
  formDiv.appendChild(btnRow);
  wrap.appendChild(formDiv);

  // Add event button (shows form)
  if(!lsFormOpen){
    var showFormBtn=el('button',{style:{width:'100%',padding:'7px',borderRadius:'8px',
      border:'1px dashed #3a3f55',background:'none',color:'#6c8ef0',cursor:'pointer',
      fontWeight:'900',fontSize:'12px',marginBottom:'8px'},
      onClick:function(){lsFormOpen=true;render();}},
      '+ Add Lump Sum Event');
    wrap.appendChild(showFormBtn);
  }

  // Event list
  if(state.lumpSums.length===0){
    wrap.appendChild(el('div',{style:{fontSize:'11px',color:'#5a6080',padding:'6px 0'}},'No events added yet.'));
  } else {
    state.lumpSums.forEach(function(ls){
      var typeCol=ls.type==='inflow'?'#5dd87a':ls.type==='outflow'?'#f06c6c':'#6c8ef0';
      var typeLabel=ls.type==='inflow'?'IN':ls.type==='outflow'?'OUT':'SUPER';
      var sign=ls.type==='outflow'?'-':'+';
      var item=el('div',{class:'ls-item'},[
        el('div',{style:{flex:'1',minWidth:0}},[
          el('span',{style:{fontWeight:'700',color:'#e8eaf0'}},ls.label+' '),
          el('span',{style:{color:'#5a6080'}},'Age '+ls.age+' · '),
          el('span',{style:{color:ls.type==='outflow'?'#f06c6c':'#5dd87a',fontWeight:'700'}},sign+fmt(ls.amount)),
          state.hasPartner?el('span',{style:{marginLeft:'4px',fontSize:'10px',color:'#5a6080'}},
            ls.who==='rob'?'('+nameYou()+')':ls.who==='tina'?'('+namePartner()+')':'(Both)'):null,
          el('span',{class:'ls-badge '+(ls.type==='inflow'?'badge-in':ls.type==='outflow'?'badge-out':'badge-super')},typeLabel),
          ls.downsizer?el('span',{class:'ls-badge badge-down'},'↓DS'):null
        ]),
        el('button',{class:'ls-del',title:'Remove',onClick:function(){
          state.lumpSums=state.lumpSums.filter(function(x){return x.id!==ls.id;});
          render();
        }},'×')
      ]);
      wrap.appendChild(item);
    });
  }
  return wrap;
}

// ─── Chart ─────────────────────────────────────────────────────────────────
function balanceChart(rows,rowsB,rowsShock,mcRows){
  var W=980,H=340,pL=72,pR=22,pT=28,pB=42;
  var xMin=rows[0].age,xMax=rows[rows.length-1].age;
  var allVals=rows.map(function(r){return r.combinedClose;});
  if(rowsB)rowsB.forEach(function(r){allVals.push(r.combinedClose);});
  if(rowsShock)rowsShock.forEach(function(r){allVals.push(r.combinedClose);});
  if(mcRows){var mcFcast=mcRows.filter(function(r){return r.age>=state.startAge;});if(mcFcast.length){allVals.push(mcFcast[mcFcast.length-1].p90);}}
  var yMax=Math.max.apply(null,allVals)*1.08;
  var xD=(xMax-xMin)||1,yD=yMax||1;
  function xp(a){return pL+((a-xMin)/xD)*(W-pL-pR);}
  function yp(v){return pT+(1-(v/yD))*(H-pT-pB);}
  function mkPath(arr,key){
    return arr.map(function(r,i){return(i===0?'M ':'L ')+xp(r.age).toFixed(1)+' '+yp(r[key]).toFixed(1);}).join(' ');
  }

  var svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H,style:'width:100%;height:auto;display:block;cursor:crosshair'});
  svg.appendChild(svgEl('rect',{x:'0',y:'0',width:String(W),height:String(H),fill:'#0f1117'}));

  // Grid
  for(var gi=0;gi<=4;gi++){
    var gv=yMax*gi/4,gy=yp(gv);
    svg.appendChild(svgEl('line',{x1:String(pL),y1:String(gy),x2:String(W-pR),y2:String(gy),stroke:'rgba(255,255,255,.05)'}));
    svg.appendChild(svgEl('text',{x:String(pL-6),y:String(gy+4),fill:'#5a6080','text-anchor':'end',style:'font-family:monospace;font-size:10px'},fmt(gv)));
  }
  // X labels
  var step=Math.max(1,Math.ceil((xMax-xMin)/8));
  for(var xa=xMin;xa<=xMax;xa+=step){
    svg.appendChild(svgEl('text',{x:String(xp(xa)),y:String(H-pB+16),fill:'#5a6080','text-anchor':'middle',style:'font-family:monospace;font-size:10px'},String(yearForAge(xa))));
  }
  // X axis line
  svg.appendChild(svgEl('line',{x1:String(pL),y1:String(H-pB),x2:String(W-pR),y2:String(H-pB),stroke:'rgba(255,255,255,.1)'}));

  // Retirement markers
  function addMarker(age,label,col){
    if(age<xMin||age>xMax)return;
    var xx=xp(age);
    svg.appendChild(svgEl('line',{x1:String(xx),y1:String(pT),x2:String(xx),y2:String(H-pB),
      stroke:col,'stroke-width':'1','stroke-dasharray':'4,3',opacity:'0.65'}));
    svg.appendChild(svgEl('text',{x:String(xx+3),y:String(pT+11),fill:col,style:'font-size:10px;font-weight:bold'},label));
  }
  // state.tinaRetireAge is a Partner-space age — translate to the shared
  // robAge x-axis (what YOUR age will be when Partner retires) before it
  // can be plotted alongside state.robRetireAge.
  addMarker(state.robRetireAge,nameYou()+' '+yearForAge(state.robRetireAge),'#6c8ef0');
  if(state.hasPartner){
    var partnerRetireRobAge=ageEquivalent(state,state.tinaRetireAge);
    if(partnerRetireRobAge!==state.robRetireAge)addMarker(partnerRetireRobAge,namePartner()+' '+yearForAge(partnerRetireRobAge),'#a06cf0');
  }

  // Monte Carlo band (p10–p90)
  if(mcRows&&mcRows.length>1){
    var mcF=mcRows.filter(function(r){return r.age>=state.startAge;});
    if(mcF.length>1){
      var fwd=mcF.map(function(r){return xp(r.age).toFixed(1)+','+yp(r.p90).toFixed(1);}).join(' ');
      var bwd=mcF.slice().reverse().map(function(r){return xp(r.age).toFixed(1)+','+yp(r.p10).toFixed(1);}).join(' ');
      svg.appendChild(svgEl('polygon',{points:fwd+' '+bwd,fill:'rgba(93,216,122,0.08)',stroke:'none'}));
      var fwd25=mcF.map(function(r){return xp(r.age).toFixed(1)+','+yp(r.p75).toFixed(1);}).join(' ');
      var bwd25=mcF.slice().reverse().map(function(r){return xp(r.age).toFixed(1)+','+yp(r.p25).toFixed(1);}).join(' ');
      svg.appendChild(svgEl('polygon',{points:fwd25+' '+bwd25,fill:'rgba(93,216,122,0.10)',stroke:'none'}));
      var medPts=mcF.map(function(r,i){return(i===0?'M ':'L ')+xp(r.age).toFixed(1)+' '+yp(r.p50).toFixed(1);}).join(' ');
      svg.appendChild(svgEl('path',{d:medPts,fill:'none',stroke:'rgba(93,216,122,0.55)','stroke-width':'1.5','stroke-dasharray':'3,3'}));
    }
  }
  // Balance lines. Single-person mode: combinedClose===robClose exactly, so
  // just the You + Combined lines are drawn (they'll overlap) — no Partner
  // line to show.
  svg.appendChild(svgEl('path',{d:mkPath(rows,'robClose'),fill:'none',stroke:'#6c8ef0','stroke-width':'2'}));
  if(state.hasPartner)svg.appendChild(svgEl('path',{d:mkPath(rows,'tinaClose'),fill:'none',stroke:'#a06cf0','stroke-width':'2'}));
  svg.appendChild(svgEl('path',{d:mkPath(rows,'combinedClose'),fill:'none',stroke:'#5dd87a','stroke-width':'2.5'}));
  if(rowsB){svg.appendChild(svgEl('path',{d:mkPath(rowsB,'combinedClose'),fill:'none',stroke:'#f0b96c','stroke-width':'2','stroke-dasharray':'6,3'}));}
  if(rowsShock){
    var shockCol=state.shock.type==='crash'?'#f06c6c':'#00e5cc';
    svg.appendChild(svgEl('path',{d:mkPath(rowsShock,'combinedClose'),fill:'none',stroke:shockCol,'stroke-width':'2.5','stroke-dasharray':'8,4'}));
    // Shade shock band between base and shock
    var shockPts=rowsShock.map(function(r,i){return xp(r.age).toFixed(1)+','+yp(r.combinedClose).toFixed(1);}).join(' ');
    var basePts=rows.filter(function(r){return r.phase==='FORECAST';}).map(function(r){return xp(r.age).toFixed(1)+','+yp(r.combinedClose).toFixed(1);}).join(' ');
    var er2=state.startAge+earliestRetireYearOffset(state);
    var shockStartX=xp(er2+(state.shock.startOffset-1));
    var shockEndX=xp(er2+(state.shock.startOffset-1)+state.shock.durationYears-1);
    svg.appendChild(svgEl('rect',{x:String(shockStartX),y:String(pT),width:String(Math.max(0,shockEndX-shockStartX)),height:String(H-pT-pB),fill:shockCol,opacity:'0.07'}));
  }

  // Lump sum markers on combined line
  rows.forEach(function(r){
    if(!r.lsItems||r.lsItems.length===0)return;
    var cx=xp(r.age),cy=yp(r.combinedClose);
    var netAmt=r.lsRob+r.lsTina;
    var col=netAmt>=0?'#5dd87a':'#f06c6c';
    // Diamond shape
    var d=6;
    var pts=(cx)+','+(cy-d)+' '+(cx+d)+','+(cy)+' '+(cx)+','+(cy+d)+' '+(cx-d)+','+(cy);
    svg.appendChild(svgEl('polygon',{points:pts,fill:col,opacity:'0.9'}));
    // Short label above
    var lbl=r.lsItems.map(function(ls){return ls.label;}).join(', ');
    svg.appendChild(svgEl('text',{x:String(cx),y:String(cy-d-4),fill:col,'text-anchor':'middle',
      style:'font-size:9px;font-weight:bold'},lbl.length>18?lbl.slice(0,17)+'…':lbl));
  });

  // Legend
  var legItems=state.hasPartner
    ?[{l:nameYou(),c:'#6c8ef0'},{l:namePartner(),c:'#a06cf0'},{l:'Combined A',c:'#5dd87a'}]
    :[{l:nameYou(),c:'#6c8ef0'},{l:'Combined A',c:'#5dd87a'}];
  if(rowsB)legItems.push({l:'Combined B',c:'#f0b96c'});
  if(rowsShock){var sc2=state.shock.type==='crash'?'#f06c6c':'#00e5cc';legItems.push({l:(state.shock.type==='crash'?'Crash':'Boom')+' Shock',c:sc2});}
  if(mcRows)legItems.push({l:'MC Median',c:'rgba(93,216,122,0.7)'});
  legItems.forEach(function(it,j){
    var lx=pL+j*120,ly=H-4;

  return lines.join('');
}

// Beyond JSON.parse succeeding, sanity-check that this actually looks like a
// Super Calculator export before letting it overwrite the current scenario —
// valid-but-unrelated JSON (or a hand-edited file with a typo) could
// otherwise silently load garbage numbers into the model with no warning.
function isValidScenarioShape(obj){
  if(!obj||typeof obj!=='object')return false;
  var numFields=['startAge','tinaStartAge','robRetireAge','tinaRetireAge','endAge','spendGolden','spendSilver','spendLegacy','robSeed','tinaSeed','sgRate','robIncome','tinaIncome','robExtraContrib','tinaExtraContrib','robContribTotal','tinaContribTotal'];
  for(var i=0;i<numFields.length;i++){
    var v=obj[numFields[i]];
    if(v===undefined)continue; // deepMerge will fill missing fields from defaults
    if(typeof v!=='number'||!isFinite(v)||v<0)return false;
  }
  if(obj.startAge!==undefined&&(obj.startAge<18||obj.startAge>100))return false;
  if(obj.tinaStartAge!==undefined&&(obj.tinaStartAge<18||obj.tinaStartAge>100))return false;
  if(obj.robRetireAge!==undefined&&(obj.robRetireAge<40||obj.robRetireAge>100))return false;
  if(obj.tinaRetireAge!==undefined&&(obj.tinaRetireAge<40||obj.tinaRetireAge>100))return false;
  if(obj.endAge!==undefined&&(obj.endAge<40||obj.endAge>120))return false;
  if(obj.caps!==undefined&&(typeof obj.caps!=='object'||obj.caps===null))return false;
  if(obj.lumpSums!==undefined&&!Array.isArray(obj.lumpSums))return false;
  if(obj.yourName!==undefined&&typeof obj.yourName!=='string')return false;
  if(obj.partnerName!==undefined&&typeof obj.partnerName!=='string')return false;
  if(obj.contribMode!==undefined&&obj.contribMode!=='income'&&obj.contribMode!=='total')return false;
  if(obj.hasPartner!==undefined&&typeof obj.hasPartner!=='boolean')return false;
  // Relational check: a current age at/past the horizon end age produces an
  // empty projection — reject it here with a clear error rather than
  // silently loading a scenario that renders as a single fallback row.
  var sa=obj.startAge!==undefined?obj.startAge:defaultState().startAge;
  var ea=obj.endAge!==undefined?obj.endAge:defaultState().endAge;
  if(sa>=ea)return false;
  return true;
}
var importInp=el('input',{type:'file',accept:'application/json',style:{display:'none'}});
importInp.addEventListener('change',function(e){
  var file=e.target.files&&e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(){
    try{
      var imported=JSON.parse(String(reader.result));
      if(!isValidScenarioShape(imported))throw new Error('shape check failed');
      var tabKeep=state.tab;
      Object.assign(state,deepMerge(defaultState(),imported));
      state.tab=tabKeep;
      render();
    }catch(err){alert('Could not import that file — it doesn\'t look like a valid Super Calculator export.');}
  };
  reader.readAsText(file);
  importInp.value='';
});

function downloadBlob(text,mime,filename){

  var a=el('a',{href:url,download:filename,style:{display:'none'}});
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},0);
}
