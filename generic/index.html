      var combCagr=cagr(firstA.combinedClose,lastA.combinedClose);
      var yoyRob=actualRows.map(function(r){return r.robReturn;}).filter(function(v){return v!=null;});
      var yoyTina=actualRows.map(function(r){return r.tinaReturn;}).filter(function(v){return v!=null;});
      var avg=function(a){return a.length?a.reduce(function(s,v){return s+v;},0)/a.length:null;};
      rightCol.appendChild(panel('Actual Fund Growth (age '+firstA.age+'→'+lastA.age+', '+yearsSpan+' years)',el('div',{style:{fontSize:'12px',color:'#c0c5d8',lineHeight:'1.8'}},[
        el('div',{},[el('span',{style:{fontWeight:'900',color:'#6c8ef0'}},nameYou()+': '),(robCagr!=null?fmtPctSigned(robCagr)+'/yr compound (CAGR)':'—')+', '+(avg(yoyRob)!=null?fmtPctSigned(avg(yoyRob))+'/yr simple average':'')]),
        state.hasPartner?el('div',{},[el('span',{style:{fontWeight:'900',color:'#a06cf0'}},namePartner()+': '),(tinaCagr!=null?fmtPctSigned(tinaCagr)+'/yr compound (CAGR)':'—')+', '+(avg(yoyTina)!=null?fmtPctSigned(avg(yoyTina))+'/yr simple average':'')]):null,
        state.hasPartner?el('div',{},[el('span',{style:{fontWeight:'900',color:'#5dd87a'}},'Combined: '),(combCagr!=null?fmtPctSigned(combCagr)+'/yr compound (CAGR)':'—')]):null,
        el('div',{style:{fontSize:'10px',color:'#5a6080',marginTop:'6px'}},'These include each year\'s concessional contributions, not just investment performance — balance growth = contributions + returns, and this can\'t separate the two. Contributions were a bigger share of the balance in earlier years, so treat this as an upper-bound ballpark for the Returns sliders, not a like-for-like market return.')
      ])));
    }

    rightCol.appendChild(panel('Sensitivity: Balance at Age '+state.endAge,sensitivityTable()));
    rightCol.appendChild(panel(tblTitle,el('div',{},[
      mkTbl(tblHeaders,tblRows,function(r,i){
        var dr=dispRows[i];
        if(!dr)return null;
        if(dr.spendShortfall>1)return 'rgba(240,108,108,0.10)';
        if(dr.spendSurplus>1)return 'rgba(93,216,122,0.08)';
        if(dr.robRetires)return 'rgba(108,142,240,0.10)';
        if(dr.tinaRetires)return 'rgba(160,108,240,0.10)';
        var stc=STAGE_COLORS[dr.stage];
        return stc?stc.bg:null;
      }),
      hasShortfallRows?el('div',{style:{fontSize:'10px',color:'#f0b96c',margin:'6px 0',lineHeight:'1.4'}},
        '🔴 Red Spend figures mean the Golden/Silver/Legacy target couldn\'t be fully funded that year — pension, other income and remaining super only stretch to the amount shown; the target underneath is what you\'d actually like to spend.'):null,
      hasSurplusRows?el('div',{style:{fontSize:'10px',color:'#5dd87a',margin:'6px 0',lineHeight:'1.4'}},
        '🟢 Green Spend figures mean pension + other income (plus any super drawn) already cover more than that year\'s target — there\'s room to spend more that year, e.g. moving some of it earlier into Golden/Silver years, or just banking the extra.'):null,
      el('div',{style:{display:'flex',gap:'8px',marginTop:'8px'}},[
        el('button',{style:{padding:'5px 12px',borderRadius:'7px',border:'1px solid #252a3a',
          background:'none',color:'#6c8ef0',cursor:'pointer',fontSize:'12px'},
          onClick:function(){state.showAllRows=!state.showAllRows;render();}},
          state.showAllRows?'Show less':'Show all '+rows.length+' rows'),
        el('button',{style:{padding:'5px 12px',borderRadius:'7px',border:'1px solid #252a3a',
          background:'none',color:'#6c8ef0',cursor:'pointer',fontSize:'12px'},
          onClick:function(){
            // Full dataset (all rows, not just the displayed slice), raw
            // numbers rather than formatted strings, so it's usable in Excel.
            var csvHeaders=state.hasPartner
              ?['Year','Age','PartnerAge','Phase','Stage','YouClose','PartnerClose','Combined','YouYoYReturn','PartnerYoYReturn','CombinedYoYReturn','TargetSpend','AvailableSpend','SpendShortfall','SpendSurplus','OtherIncome','Pension','ExcessMinDrawdownCash','YouCC','PartnerCC','YouNCC','PartnerNCC','YouDiv293Tax','PartnerDiv293Tax']
              :['Year','Age','Phase','Stage','Close','YoYReturn','TargetSpend','AvailableSpend','SpendShortfall','SpendSurplus','OtherIncome','Pension','ExcessMinDrawdownCash','CC','NCC','Div293Tax'];
            var csvRows=rows.map(function(r){
              if(state.hasPartner){
                return [yearForAge(r.age),r.age,r.tinaAge,r.phase,r.stage||'',r.robClose,r.tinaClose,r.combinedClose,
                  r.robReturn!=null?r.robReturn:'',r.tinaReturn!=null?r.tinaReturn:'',r.combinedReturn!=null?r.combinedReturn:'',
                  r.grossSpend||0,r.availableSpend||0,r.spendShortfall||0,r.spendSurplus||0,r.otherIncome||0,r.pension||0,r.excessMDCash||0,r.robCC||0,r.tinaCC||0,
                  r.robNCC||0,r.tinaNCC||0,r.rDiv293||0,r.tDiv293||0];
              }
              return [yearForAge(r.age),r.age,r.phase,r.stage||'',r.robClose,
                r.robReturn!=null?r.robReturn:'',
                r.grossSpend||0,r.availableSpend||0,r.spendShortfall||0,r.spendSurplus||0,r.otherIncome||0,r.pension||0,r.excessMDCash||0,r.robCC||0,r.robNCC||0,r.rDiv293||0];
            });
            var csv=[csvHeaders].concat(csvRows).map(function(row){
              return row.map(function(v){
                var s=String(v);
                return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
              }).join(',');
            }).join('\r\n');
            downloadBlob(csv,'text/csv','super-calculator-timeline-'+new Date().toISOString().slice(0,10)+'.csv');
          }},'⬇ Export CSV')
      ])
    ])));

  } else if(state.tab==='adviser'){
    var narDiv=el('div',{style:{lineHeight:'1.85',fontSize:'13px',color:'#c0c5d8',background:'#0f1117',border:'1px solid #252a3a',borderRadius:'12px',padding:'20px'}});
    narDiv.innerHTML=narrative(rows);
    rightCol.appendChild(panel('Adviser Summary',narDiv));
    var a60=rows.filter(function(r){return r.age===60;})[0];
    var p67adv=a67?a67.pension:0;
    var advTbl=[
      ['Earliest retirement',String(er),(state.hasPartner?'Combined ':'')+fmt(aRet.combinedClose)],
      [possYou()+' balance at retire',fmt(aRet.robClose),'—']
    ];
    if(state.hasPartner)advTbl.push([namePartner()+' balance at retire',fmt(aRet.tinaClose),'—']);
    advTbl.push(
      ['Golden spend',fmt(state.spendGolden),'Gross / year'],
      ['Silver spend',fmt(state.spendSilver),'Gross / year'],
      ['Legacy spend',fmt(state.spendLegacy),'Gross / year'],
      ['Other assets',fmt(tot),'Income '+fmt(oiFirstRow?oiFirstRow.otherIncome:0)+'/yr from age '+otherIncomeStartAge(state)],
      ['Age Pension (age 67)',p67adv?fmt(p67adv):'Below threshold','Assets & income tested'],
      ['Balance at 90',fmt(a90.combinedClose),state.hasPartner?(nameYou()+' '+fmt(a90.robClose)+' | '+namePartner()+' '+fmt(a90.tinaClose)):'—'],
      ['Fund exhaustion',exh?'Age '+exh.age:'Not projected','Horizon: age '+state.endAge]
    );
    if(state.shock.enabled&&rowsShock){
      // Bug fix: this block previously called `cards.appendChild(...)`, a
      // variable that only exists in the 'super' tab branch. Referencing it
      // here threw an uncaught TypeError the moment a user was on the
      // Adviser tab with Market Shock enabled, blanking the panel with no
      // error shown (the crash happened inside a click handler, outside the
      // boot-time try/catch). Fixed by adding a row to advTbl instead, which
      // this branch already renders below.
      var baseEnd=rows[rows.length-1];var shkEnd=rowsShock[rowsShock.length-1];
      var shkImpact=shkEnd.combinedClose-baseEnd.combinedClose;
      var shkExh=rowsShock.filter(function(r){return r.phase==='FORECAST'&&r.combinedClose<=0;})[0];
      advTbl.push(['Market shock impact (age '+state.endAge+')',(shkImpact>=0?'+':'')+fmt(shkImpact),
        (state.shock.type==='crash'?'−':'+')+state.shock.magnitude+'% for '+state.shock.durationYears+'yr · '+(shkExh?'Exhausted age '+shkExh.age:'Survives horizon')]);
    }
    if(state.div293&&state.div293.enabled){
      var rDiv293Tot=rows.filter(function(r){return r.phase==='FORECAST';}).reduce(function(s,r){return s+(r.rDiv293||0);},0);
      var tDiv293Tot=rows.filter(function(r){return r.phase==='FORECAST';}).reduce(function(s,r){return s+(r.tDiv293||0);},0);
      advTbl.push(['Division 293 tax (lifetime)',fmt(rDiv293Tot+tDiv293Tot),(state.hasPartner?nameYou()+' '+fmt(rDiv293Tot)+' | '+namePartner()+' '+fmt(tDiv293Tot)+' · ':'')+'threshold '+fmt(state.div293.threshold)]);
    }
    if(state.tbc&&state.tbc.enabled){
      var robTBCRow=rows.filter(function(r){return r.phase==='FORECAST'&&r.robOverTBC;})[0];
      var tinaTBCRow=rows.filter(function(r){return r.phase==='FORECAST'&&r.tinaOverTBC;})[0];
      if(robTBCRow||tinaTBCRow){
        var tbcNote=state.hasPartner
          ?nameYou()+': '+(robTBCRow?'from age '+robTBCRow.age:'no')+' · '+namePartner()+': '+(tinaTBCRow?'from age '+tinaTBCRow.tinaAge:'no')
          :'From age '+robTBCRow.age;
        advTbl.push(['Transfer Balance Cap exceeded',tbcNote,'Excess above cap taxed at 15%, not 0%, in retirement']);
      }
    }
    if(state.lumpSums.length>0){
      state.lumpSums.forEach(function(ls){
        var sign=ls.type==='outflow'?'-':'+';
        var whoLbl=ls.who==='rob'?nameYou():ls.who==='tina'?namePartner():'Both';
        advTbl.push(['Event: '+ls.label,'Age '+ls.age+' · '+sign+fmt(ls.amount),state.hasPartner?(whoLbl+(ls.downsizer?' (downsizer)':'')):(ls.downsizer?'Downsizer':'—')]);
      });
    }
    rightCol.appendChild(panel('Assumptions & Events',mkTbl(['Item','Value','Note'],advTbl)));

  } else {
    // Scenario B tab
    var sb=state.scenarioB;
    var sbCtrl=el('div',{});
    sbCtrl.appendChild(tog(state.showScenarioB?'Show on chart: ON':'Show on chart: OFF',state.showScenarioB,function(){state.showScenarioB=!state.showScenarioB;render();}));
    sbCtrl.appendChild(el('div',{style:{fontSize:'11px',color:'#5a6080',margin:'6px 0 10px'}},'Scenario B uses same lump sums as A. Amber dashed line on chart.'));
    var sbFields=[['B: '+nameYou()+' work return','robWorkReturn']];
    if(state.hasPartner)sbFields.push(['B: '+namePartner()+' work return','tinaWorkReturn']);
    sbFields.push(['B: Retirement return','retireReturn']);
    sbFields.forEach(function(x){
      sbCtrl.appendChild(sld(x[0],x[1]==='retireReturn'?0:3,15,0.05,sb[x[1]]*100,fmtPct(sb[x[1]]),function(v){sb[x[1]]=v/100;render();}));
    });
    sbCtrl.appendChild(sld('B: '+nameYou()+' '+verbYou('retire','retires')+' at',55,70,1,sb.robRetireAge,String(sb.robRetireAge),function(v){sb.robRetireAge=v;render();}));
    if(state.hasPartner)sbCtrl.appendChild(sld('B: '+namePartner()+' retires at',55,70,1,sb.tinaRetireAge,String(sb.tinaRetireAge),function(v){sb.tinaRetireAge=v;render();}));
    sbCtrl.appendChild(sld('B: Golden spend',50000,500000,5000,sb.spendGolden,fmt(sb.spendGolden),function(v){sb.spendGolden=v;render();}));
    sbCtrl.appendChild(sld('B: Silver spend',50000,500000,5000,sb.spendSilver,fmt(sb.spendSilver),function(v){sb.spendSilver=v;render();}));
    sbCtrl.appendChild(sld('B: Legacy spend',50000,500000,5000,sb.spendLegacy,fmt(sb.spendLegacy),function(v){sb.spendLegacy=v;render();}));
    rightCol.appendChild(panel('Scenario B Settings',sbCtrl));
    if(rowsB){
      // sb (=state.scenarioB) doesn't carry its own startAge/tinaStartAge —
      // Scenario B reuses the same two people's current ages, just with
      // different retire-age/return/spend assumptions.
      var erBOffset=state.hasPartner
        ?Math.min(yearsToRetire(state.startAge,sb.robRetireAge),yearsToRetire(state.tinaStartAge,sb.tinaRetireAge))
        :yearsToRetire(state.startAge,sb.robRetireAge);
      var erB=state.startAge+erBOffset;
      var aRetB=rowsB.filter(function(r){return r.age===erB;})[0]||rowsB[0];
      var a90B=rowsB.filter(function(r){return r.age===90;})[0]||rowsB[rowsB.length-1];
      var exhB=rowsB.filter(function(r){return r.phase==='FORECAST'&&r.combinedClose<=0;})[0];
      var cmp=[
        ['Retire ages',
          state.hasPartner?(nameYou()+' '+state.robRetireAge+' / '+namePartner()+' '+state.tinaRetireAge):(nameYou()+' '+state.robRetireAge),
          state.hasPartner?(nameYou()+' '+sb.robRetireAge+' / '+namePartner()+' '+sb.tinaRetireAge):(nameYou()+' '+sb.robRetireAge)],
        ['Combined at retirement',fmt(aRet.combinedClose),fmt(aRetB.combinedClose)],
        ['Golden spend',fmt(state.spendGolden),fmt(sb.spendGolden)],
        ['Silver spend',fmt(state.spendSilver),fmt(sb.spendSilver)],
        ['Legacy spend',fmt(state.spendLegacy),fmt(sb.spendLegacy)],
        ['Balance at 90',fmt(a90.combinedClose),fmt(a90B.combinedClose)],
        ['Fund exhaustion',exh?'Age '+exh.age:'None',exhB?'Age '+exhB.age:'None']
      ];
      rightCol.appendChild(panel('A vs B Comparison',mkTbl(['Metric','Scenario A','Scenario B'],cmp)));
      rightCol.appendChild(panel('Chart Comparison',balanceChart(rows,rowsB,rowsShock,mcRows)));
    }
  }
}

render();

}catch(e){showFatal(e&&e.message?e.message:String(e),e);}
})();
</script>
</body>
</html>
